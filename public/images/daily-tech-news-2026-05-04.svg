<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Circuit lines -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.15">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="530" x2="1200" y2="530"/>
  </g>
  <!-- Chip icon -->
  <g transform="translate(520,80)" filter="url(#glow)">
    <rect x="0" y="0" width="160" height="120" rx="12" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <rect x="30" y="25" width="100" height="70" rx="6" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <!-- Pins top -->
    <line x1="20" y1="0" x2="20" y2="-15" stroke="#00d4ff" stroke-width="3"/>
    <line x1="50" y1="0" x2="50" y2="-15" stroke="#00d4ff" stroke-width="3"/>
    <line x1="80" y1="0" x2="80" y2="-15" stroke="#00d4ff" stroke-width="3"/>
    <line x1="110" y1="0" x2="110" y2="-15" stroke="#00d4ff" stroke-width="3"/>
    <line x1="140" y1="0" x2="140" y2="-15" stroke="#00d4ff" stroke-width="3"/>
    <!-- Pins bottom -->
    <line x1="20" y1="120" x2="20" y2="135" stroke="#00d4ff" stroke-width="3"/>
    <line x1="50" y1="120" x2="50" y2="135" stroke="#00d4ff" stroke-width="3"/>
    <line x1="80" y1="120" x2="80" y2="135" stroke="#00d4ff" stroke-width="3"/>
    <line x1="110" y1="120" x2="110" y2="135" stroke="#00d4ff" stroke-width="3"/>
    <line x1="140" y1="120" x2="140" y2="135" stroke="#00d4ff" stroke-width="3"/>
    <!-- Pins left -->
    <line x1="0" y1="20" x2="-15" y2="20" stroke="#00d4ff" stroke-width="3"/>
    <line x1="0" y1="50" x2="-15" y2="50" stroke="#00d4ff" stroke-width="3"/>
    <line x1="0" y1="80" x2="-15" y2="80" stroke="#00d4ff" stroke-width="3"/>
    <line x1="0" y1="105" x2="-15" y2="105" stroke="#00d4ff" stroke-width="3"/>
    <!-- Pins right -->
    <line x1="160" y1="20" x2="175" y2="20" stroke="#00d4ff" stroke-width="3"/>
    <line x1="160" y1="50" x2="175" y2="50" stroke="#00d4ff" stroke-width="3"/>
    <line x1="160" y1="80" x2="175" y2="80" stroke="#00d4ff" stroke-width="3"/>
    <line x1="160" y1="105" x2="175" y2="105" stroke="#00d4ff" stroke-width="3"/>
    <!-- AI text inside chip -->
    <text x="80" y="70" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="32" font-weight="bold">AI</text>
  </g>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" fill="url(#accent)" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold">🔬 每日科技日报</text>
  <text x="600" y="390" text-anchor="middle" fill="#c8d6e5" font-family="system-ui, -apple-system, sans-serif" font-size="28">Daily Tech News</text>
  <!-- Date -->
  <text x="600" y="460" text-anchor="middle" fill="#7b8c9d" font-family="monospace" font-size="22">2026-05-04 · Monday</text>
  <!-- Tags -->
  <g transform="translate(380, 500)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <text x="55" y="21" text-anchor="middle" fill="#00d4ff" font-family="system-ui" font-size="14">AI</text>
    <rect x="130" y="0" width="110" height="32" rx="16" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.7"/>
    <text x="185" y="21" text-anchor="middle" fill="#7b2ff7" font-family="system-ui" font-size="14">芯片</text>
    <rect x="260" y="0" width="130" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <text x="325" y="21" text-anchor="middle" fill="#00d4ff" font-family="system-ui" font-size="14">半导体</text>
  </g>
  <!-- Bottom accent line -->
  <rect x="400" y="570" width="400" height="3" rx="1.5" fill="url(#accent)"/>
</svg>