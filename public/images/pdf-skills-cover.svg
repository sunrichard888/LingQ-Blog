<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03">
    <defs>
      <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="white" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="240" cy="504" r="200" fill="url(#accent)" opacity="0.2"/>
  <circle cx="960" cy="126" r="200" fill="url(#accent)" opacity="0.2"/>
  
  <!-- Badge -->
  <rect x="420" y="80" width="360" height="40" rx="20" fill="url(#accent)" opacity="0.2" stroke="url(#accent)" stroke-width="1"/>
  <text x="600" y="107" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="middle">📄 OpenClaw PDF 技能对比报告</text>
  
  <!-- Icons -->
  <g font-size="56" text-anchor="middle" filter="url(#shadow)">
    <text x="400" y="220" fill="url(#accent)">✏️</text>
    <text x="600" y="220" fill="url(#accent)">📄</text>
    <text x="800" y="220" fill="url(#accent)">⚠️</text>
  </g>
  
  <!-- Skill names -->
  <g font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">
    <text x="400" y="260">nano-pdf</text>
    <text x="600" y="260">pdf-generator</text>
    <text x="800" y="260">pdf ⚠️</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="48" font-weight="800" fill="url(#title)" text-anchor="middle" letter-spacing="-2">PDF Skills Comparison</text>
  
  <!-- Subtitle -->
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">PDF 处理技能全景指南</text>
  
  <!-- Comparison tags -->
  <g font-family="Arial, sans-serif" font-size="16" font-weight="500">
    <!-- Tag 1 -->
    <rect x="300" y="440" width="180" height="40" rx="20" fill="rgba(102, 126, 234, 0.2)" stroke="rgba(102, 126, 234, 0.4)"/>
    <text x="390" y="466" fill="#a5b4fc" text-anchor="middle">✏️ 编辑 PDF</text>
    
    <!-- Tag 2 -->
    <rect x="510" y="440" width="180" height="40" rx="20" fill="rgba(118, 75, 162, 0.2)" stroke="rgba(118, 75, 162, 0.4)"/>
    <text x="600" y="466" fill="#c4b5fd" text-anchor="middle">📄 生成 PDF</text>
    
    <!-- Tag 3 -->
    <rect x="720" y="440" width="180" height="40" rx="20" fill="rgba(233, 21, 131, 0.2)" stroke="rgba(233, 21, 131, 0.4)"/>
    <text x="810" y="466" fill="#f9a8d4" text-anchor="middle">⚠️ 安全警告</text>
    
    <!-- Tag 4 -->
    <rect x="405" y="495" width="180" height="40" rx="20" fill="rgba(102, 126, 234, 0.2)" stroke="rgba(102, 126, 234, 0.4)"/>
    <text x="495" y="521" fill="#a5b4fc" text-anchor="middle">✅ nano-pdf 安全</text>
    
    <!-- Tag 5 -->
    <rect x="615" y="495" width="180" height="40" rx="20" fill="rgba(102, 126, 234, 0.2)" stroke="rgba(102, 126, 234, 0.4)"/>
    <text x="705" y="521" fill="#a5b4fc" text-anchor="middle">✅ pdf-generator 安全</text>
  </g>
  
  <!-- Meta info -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#64748b">
    <text x="480" y="590" text-anchor="middle">📅 2026-03-10</text>
    <text x="600" y="590" text-anchor="middle">📄 Version 1.0.0</text>
    <text x="720" y="590" text-anchor="middle">🎯 3 Skills</text>
  </g>
</svg>
