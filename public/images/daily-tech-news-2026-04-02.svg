<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="url(#accent)" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#ffffff">每日科技新闻</text>
  
  <!-- Date -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#00d9ff">2026 年 4 月 2 日</text>
  
  <!-- Topic badge -->
  <rect x="450" y="300" width="300" height="60" rx="30" fill="url(#accent)"/>
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#1a1a2e">AI · 芯片 · 半导体</text>
  
  <!-- Bottom decoration -->
  <line x1="200" y1="500" x2="1000" y2="500" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  
  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#888888">LingQ-Blog Daily Tech News</text>
</svg>
