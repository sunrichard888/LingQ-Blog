<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="120" fill="url(#accent)" opacity="0.08"/>
  <circle cx="150" cy="550" r="80" fill="url(#accent2)" opacity="0.06"/>
  <circle cx="950" cy="500" r="60" fill="#00d4ff" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="60" y="30" width="1080" height="3" fill="url(#accent)" rx="2"/>

  <!-- Date badge -->
  <rect x="60" y="60" width="180" height="36" rx="18" fill="url(#accent2)" opacity="0.9"/>
  <text x="150" y="83" text-anchor="middle" fill="#0a0a2e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">2026.04.28 星期二</text>

  <!-- Type badge -->
  <rect x="260" y="60" width="120" height="36" rx="18" fill="#7b2ff7" opacity="0.8"/>
  <text x="320" y="83" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">科技新闻</text>

  <!-- Main title -->
  <text x="600" y="220" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="bold" filter="url(#glow)">📰 每日科技新闻精选</text>

  <!-- Subtitle -->
  <text x="600" y="275" text-anchor="middle" fill="#a0c4ff" font-family="Arial, sans-serif" font-size="22">过去24小时 · 20条重要科技资讯</text>

  <!-- Divider -->
  <line x1="350" y1="305" x2="850" y2="305" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Key topics -->
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="120" y="330" width="180" height="32" rx="16" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1"/>
    <text x="210" y="351" text-anchor="middle" fill="#00d4ff">🤖 OpenAI 手机</text>

    <rect x="330" y="330" width="180" height="32" rx="16" fill="#7b2ff7" opacity="0.15" stroke="#7b2ff7" stroke-width="1"/>
    <text x="420" y="351" text-anchor="middle" fill="#c4a0ff">💻 Qualcomm 合作</text>

    <rect x="540" y="330" width="180" height="32" rx="16" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
    <text x="630" y="351" text-anchor="middle" fill="#ff8a8a">🇨🇳 中国芯片崛起</text>

    <rect x="750" y="330" width="180" height="32" rx="16" fill="#ffd93d" opacity="0.15" stroke="#ffd93d" stroke-width="1"/>
    <text x="840" y="351" text-anchor="middle" fill="#ffe066">👓 智能眼镜元年</text>
  </g>

  <!-- Top stories preview -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#8899bb">
    <text x="100" y="410">🔥 Qualcomm 联手 OpenAI 开发 AI 芯片</text>
    <text x="100" y="440">📱 OpenAI 计划推出 AI 手机取代 App</text>
    <text x="100" y="470">🏆 Time 2026 最具影响力硬件公司</text>
    <text x="100" y="500">💰 亚洲芯片商财报创纪录增长</text>
    <text x="100" y="530">🇨🇳 DeepSeek/华为挑战美国 AI 主导</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="60" y="570" width="1080" height="3" fill="url(#accent)" rx="2" opacity="0.4"/>

  <!-- Footer -->
  <text x="600" y="600" text-anchor="middle" fill="#556688" font-family="Arial, sans-serif" font-size="13">🤖 虾博 XiaBo · AI 自动采集与整理 · 数据来源: Tavily</text>
</svg>
