<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#2d5a87"/>
      <stop offset="100%" style="stop-color:#3d7ab0"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Circuit pattern -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="2" fill="none">
    <path d="M 100 100 L 200 100 L 200 200"/>
    <path d="M 1100 100 L 1000 100 L 1000 200"/>
    <path d="M 100 530 L 200 530 L 200 430"/>
    <path d="M 1100 530 L 1000 530 L 1000 430"/>
    <circle cx="200" cy="100" r="4" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1000" cy="100" r="4" fill="rgba(255,255,255,0.1)"/>
    <circle cx="200" cy="530" r="4" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1000" cy="530" r="4" fill="rgba(255,255,255,0.1)"/>
  </g>
  
  <!-- Network nodes -->
  <g fill="rgba(96,165,250,0.2)">
    <circle cx="150" cy="150" r="80"/>
    <circle cx="1050" cy="150" r="100"/>
    <circle cx="150" cy="480" r="90"/>
    <circle cx="1050" cy="480" r="85"/>
  </g>
  
  <!-- Main icon -->
  <g transform="translate(600, 160)" filter="url(#glow)">
    <rect x="-80" y="-80" width="160" height="160" rx="32" fill="rgba(96,165,250,0.25)" stroke="rgba(96,165,250,0.5)" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" font-size="90">🦞</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="url(#title)" filter="url(#shadow)">OpenClaw 深度分析</text>
  
  <!-- Subtitle -->
  <text x="600" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#bfdbfe" letter-spacing="3">PERSONAL AI ASSISTANT REVOLUTION</text>
  
  <!-- Divider -->
  <line x1="300" y1="370" x2="900" y2="370" stroke="rgba(96,165,250,0.4)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Feature badges -->
  <g transform="translate(300, 410)">
    <rect x="0" y="0" width="180" height="60" rx="12" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">🤖 AI 助手</text>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bfdbfe">个人化革命</text>
  </g>
  
  <g transform="translate(510, 410)">
    <rect x="0" y="0" width="180" height="60" rx="12" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">🔓 开源</text>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bfdbfe">完全透明</text>
  </g>
  
  <g transform="translate(720, 410)">
    <rect x="0" y="0" width="180" height="60" rx="12" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
    <text x="90" y="25" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">🚀 2026</text>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui" font-size="11" fill="#bfdbfe">技术趋势</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui" font-size="14" fill="#93c5fd" letter-spacing="1">LingQ Blog · 2026-03-04 · 深度技术解析</text>
  
  <!-- Corner decorations -->
  <circle cx="60" cy="60" r="6" fill="rgba(96,165,250,0.5)"/>
  <circle cx="1140" cy="60" r="6" fill="rgba(96,165,250,0.5)"/>
  <circle cx="60" cy="570" r="6" fill="rgba(96,165,250,0.5)"/>
  <circle cx="1140" cy="570" r="6" fill="rgba(96,165,250,0.5)"/>
</svg>
