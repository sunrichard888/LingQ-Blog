<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="150" cy="100" r="80" fill="url(#glow)"/>
  <circle cx="1050" cy="530" r="120" fill="url(#glow)"/>
  <circle cx="600" cy="315" r="200" fill="url(#glow)" opacity="0.15"/>

  <!-- Circuit-like decorative lines -->
  <g stroke="url(#accent)" stroke-width="2" opacity="0.3" fill="none">
    <path d="M50,580 L150,580 L180,550 L180,500"/>
    <circle cx="50" cy="580" r="4" fill="#3b82f6" stroke="none"/>
    <path d="M1150,50 L1050,50 L1020,80 L1020,130"/>
    <circle cx="1150" cy="50" r="4" fill="#8b5cf6" stroke="none"/>
    <path d="M50,50 L100,50 L130,80 L130,150 L100,180"/>
    <circle cx="50" cy="50" r="4" fill="#06b6d4" stroke="none"/>
  </g>

  <!-- Chip icon -->
  <g transform="translate(80, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    <rect x="20" y="20" width="80" height="80" rx="8" fill="url(#accent)" opacity="0.2"/>
    <!-- Chip pins -->
    <line x1="30" y1="-8" x2="30" y2="0" stroke="#3b82f6" stroke-width="3"/>
    <line x1="60" y1="-8" x2="60" y2="0" stroke="#3b82f6" stroke-width="3"/>
    <line x1="90" y1="-8" x2="90" y2="0" stroke="#3b82f6" stroke-width="3"/>
    <line x1="30" y1="120" x2="30" y2="128" stroke="#3b82f6" stroke-width="3"/>
    <line x1="60" y1="120" x2="60" y2="128" stroke="#3b82f6" stroke-width="3"/>
    <line x1="90" y1="120" x2="90" y2="128" stroke="#3b82f6" stroke-width="3"/>
    <line x1="-8" y1="30" x2="0" y2="30" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="-8" y1="60" x2="0" y2="60" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="-8" y1="90" x2="0" y2="90" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="120" y1="30" x2="128" y2="30" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="120" y1="60" x2="128" y2="60" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="120" y1="90" x2="128" y2="90" stroke="#8b5cf6" stroke-width="3"/>
    <!-- Inner circuit -->
    <rect x="40" y="40" width="40" height="40" rx="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="60" r="8" fill="#3b82f6" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="800" fill="#fff" filter="url(#shadow)">📰 每日科技新闻精选</text>

  <!-- Date -->
  <text x="600" y="290" text-anchor="middle" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="600" fill="url(#accent)">2026 年 4 月 26 日 · 星期日</text>

  <!-- Divider -->
  <line x1="400" y1="320" x2="800" y2="320" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Keywords -->
  <g font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" opacity="0.8">
    <rect x="340" y="345" width="130" height="36" rx="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
    <text x="405" y="368" text-anchor="middle" fill="#93c5fd">🔥 AI 芯片</text>

    <rect x="485" y="345" width="130" height="36" rx="18" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="550" y="368" text-anchor="middle" fill="#c4b5fd">⚡ 量子计算</text>

    <rect x="630" y="345" width="130" height="36" rx="18" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="695" y="368" text-anchor="middle" fill="#67e8f9">🇨🇳 AI 自主化</text>

    <rect x="775" y="345" width="130" height="36" rx="18" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="840" y="368" text-anchor="middle" fill="#6ee7b7">🤖 机器人</text>
  </g>

  <!-- Bottom info -->
  <text x="600" y="440" text-anchor="middle" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#94a3b8">20 条精选科技资讯 · 覆盖 AI · 芯片 · 半导体 · 量子计算 · 机器人</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000" opacity="0.3"/>
  <text x="600" y="605" text-anchor="middle" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#64748b">🤖 XiaBo 自动推送 · 奇偶天判断：偶数天 → 科技新闻 · 数据来源：Tavily Search</text>

  <!-- Decorative corner elements -->
  <path d="M0,0 L60,0 L60,3 L3,3 L3,60 L0,60 Z" fill="#3b82f6" opacity="0.5"/>
  <path d="M1200,0 L1140,0 L1140,3 L1197,3 L1197,60 L1200,60 Z" fill="#8b5cf6" opacity="0.5"/>
  <path d="M0,630 L60,630 L60,627 L3,627 L3,570 L0,570 Z" fill="#06b6d4" opacity="0.5"/>
  <path d="M1200,630 L1140,630 L1140,627 L1197,627 L1197,570 L1200,570 Z" fill="#10b981" opacity="0.5"/>
</svg>
