<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ff444433;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff444400;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#ff880033;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff880000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Radar sweep arc -->
  <path d="M 600 300 L 750 150 A 210 210 0 0 1 810 300 Z" fill="#ff444415" stroke="#ff444444" stroke-width="1"/>
  <path d="M 600 300 L 750 150" stroke="#ff444466" stroke-width="1.5" stroke-dasharray="4,4"/>
  <path d="M 600 300 L 810 300" stroke="#ff444466" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Concentric radar circles -->
  <circle cx="600" cy="300" r="70" fill="none" stroke="#ff444422" stroke-width="1"/>
  <circle cx="600" cy="300" r="140" fill="none" stroke="#ff444422" stroke-width="1"/>
  <circle cx="600" cy="300" r="210" fill="none" stroke="#ff444422" stroke-width="1"/>
  <circle cx="600" cy="300" r="4" fill="#ff4444"/>
  
  <!-- Target blips on radar -->
  <circle cx="660" cy="240" r="4" fill="#ff8800" opacity="0.9"/>
  <circle cx="720" cy="200" r="3" fill="#ff8800" opacity="0.7"/>
  <circle cx="690" cy="280" r="3" fill="#ff4444" opacity="0.8"/>
  <circle cx="770" cy="230" r="2.5" fill="#ff8800" opacity="0.6"/>
  <circle cx="740" cy="160" r="2" fill="#ff8800" opacity="0.5"/>
  
  <!-- Shield icon (left) -->
  <g transform="translate(120, 180)">
    <path d="M 40 0 L 80 20 L 80 60 Q 80 100 40 120 Q 0 100 0 60 L 0 20 Z" fill="none" stroke="#ff880066" stroke-width="2"/>
    <path d="M 40 15 L 65 28 L 65 58 Q 65 88 40 105 Q 15 88 15 58 L 15 28 Z" fill="#ff880011"/>
    <text x="40" y="70" text-anchor="middle" fill="#ff8800" font-size="28" font-family="Arial">⚔</text>
  </g>
  
  <!-- Drone icon (right) -->
  <g transform="translate(980, 150)">
    <rect x="20" y="30" width="60" height="10" rx="5" fill="#ff444444"/>
    <line x1="30" y1="30" x2="15" y2="15" stroke="#ff444466" stroke-width="2"/>
    <line x1="70" y1="30" x2="85" y2="15" stroke="#ff444466" stroke-width="2"/>
    <circle cx="15" cy="12" r="10" fill="none" stroke="#ff444444" stroke-width="1.5"/>
    <circle cx="85" cy="12" r="10" fill="none" stroke="#ff444444" stroke-width="1.5"/>
    <circle cx="15" cy="12" r="3" fill="#ff444433"/>
    <circle cx="85" cy="12" r="3" fill="#ff444433"/>
  </g>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" fill="#ffffff" font-size="52" font-weight="bold" font-family="Arial, sans-serif" letter-spacing="3">
    🎖️ 军事新闻速递
  </text>
  <text x="600" y="470" text-anchor="middle" fill="#ff8800" font-size="28" font-family="Arial, sans-serif" letter-spacing="2">
    MILITARY NEWS DAILY
  </text>
  <text x="600" y="510" text-anchor="middle" fill="#ffffff88" font-size="22" font-family="Arial, sans-serif">
    2026-05-29 · 奇数天特刊
  </text>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- Bottom tags -->
  <g transform="translate(350, 560)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#ff444422" stroke="#ff444444" stroke-width="1"/>
    <text x="50" y="20" text-anchor="middle" fill="#ff8800" font-size="13" font-family="Arial">国防装备</text>
    
    <rect x="120" y="0" width="100" height="30" rx="15" fill="#ff444422" stroke="#ff444444" stroke-width="1"/>
    <text x="170" y="20" text-anchor="middle" fill="#ff8800" font-size="13" font-family="Arial">军事科技</text>
    
    <rect x="240" y="0" width="100" height="30" rx="15" fill="#ff444422" stroke="#ff444444" stroke-width="1"/>
    <text x="290" y="20" text-anchor="middle" fill="#ff8800" font-size="13" font-family="Arial">特种作战</text>
    
    <rect x="360" y="0" width="100" height="30" rx="15" fill="#ff444422" stroke="#ff444444" stroke-width="1"/>
    <text x="410" y="20" text-anchor="middle" fill="#ff8800" font-size="13" font-family="Arial">地缘政治</text>
  </g>
</svg>
