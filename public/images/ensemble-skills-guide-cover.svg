<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="600" cy="315" r="200" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Main title -->
  <text x="600" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">
    Ensemble Team + Pipeline
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    AI Agent 协作技能体系完整指南
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Tags -->
  <g transform="translate(600, 440)">
    <rect x="-180" y="-20" width="120" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="8" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">🤖 AI Agent</text>
    
    <rect x="-40" y="-20" width="140" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="30" y="8" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">🧪 TDD</text>
    
    <rect x="120" y="-20" width="160" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="200" y="8" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">🏭 Pipeline</text>
  </g>
  
  <!-- Date -->
  <text x="600" y="550" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    2026-03-23
  </text>
</svg>
