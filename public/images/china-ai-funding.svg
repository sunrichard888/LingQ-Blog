<svg width="800" height="550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="550" fill="url(#bg2)"/>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">💰 2026 年 AI 公司融资对比</text>
  
  <!-- 柱状图 -->
  <!-- 阶跃星辰 50 亿 -->
  <rect x="80" y="100" width="100" height="200" fill="#ffd700" rx="5"/>
  <text x="130" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle">50 亿</text>
  <text x="130" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">阶跃星辰</text>
  <text x="130" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#888888" text-anchor="middle">B+ 轮</text>
  
  <!-- 月之暗面 12 亿 -->
  <rect x="220" y="152" width="100" height="148" fill="#4da6ff" rx="5"/>
  <text x="270" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#4da6ff" text-anchor="middle">12 亿</text>
  <text x="270" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">月之暗面</text>
  <text x="270" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#888888" text-anchor="middle">美元</text>
  
  <!-- 智谱 IPO 43 亿 -->
  <rect x="360" y="108" width="100" height="192" fill="#ff6b6b" rx="5"/>
  <text x="410" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ff6b6b" text-anchor="middle">43 亿</text>
  <text x="410" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">智谱 AI</text>
  <text x="410" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#888888" text-anchor="middle">IPO 募资</text>
  
  <!-- MiniMax IPO 34 亿 -->
  <rect x="500" y="116" width="100" height="184" fill="#95e1d3" rx="5"/>
  <text x="550" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#95e1d3" text-anchor="middle">34 亿</text>
  <text x="550" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">MiniMax</text>
  <text x="550" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#888888" text-anchor="middle">IPO 募资</text>
  
  <!-- 百川智能（估计） -->
  <rect x="640" y="200" width="100" height="100" fill="#a8a8a8" rx="5"/>
  <text x="690" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#a8a8a8" text-anchor="middle">数亿</text>
  <text x="690" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">百川智能</text>
  <text x="690" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#888888" text-anchor="middle">未披露</text>
  
  <!-- Y 轴标签 -->
  <text x="50" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">50 亿</text>
  <text x="50" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">25 亿</text>
  <text x="50" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">0 亿</text>
  
  <!-- Y 轴线 -->
  <line x1="60" y1="100" x2="60" y2="300" stroke="#444444" stroke-width="2"/>
  
  <!-- 右侧说明框 -->
  <rect x="50" y="380" width="700" height="130" fill="rgba(255,255,255,0.05)" rx="10"/>
  
  <text x="400" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#ffd700" text-anchor="middle">🎯 关键洞察</text>
  
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc">
    <text x="80" y="440">• 阶跃星辰 50 亿 B+ 轮刷新 12 个月中国大模型赛道单笔最高融资纪录</text>
    <text x="80" y="465">• 智谱、MiniMax 已上市，阶跃星辰冲刺"中国大模型第三股"</text>
    <text x="80" y="490">• 月之暗面现金储备超 100 亿元，上市不迫切</text>
    <text x="80" y="515">• 2026 年 1 月 AI 领域 42 起亿级以上融资，总额 187.68 亿元</text>
  </g>
</svg>
