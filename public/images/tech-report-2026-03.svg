<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 科技网格 -->
  <g stroke="rgba(100,100,255,0.08)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>
  
  <!-- 装饰圆圈 - AI 神经网络 -->
  <g fill="none" stroke="rgba(0,200,255,0.15)" stroke-width="2">
    <circle cx="950" cy="150" r="50"/>
    <circle cx="950" cy="150" r="90"/>
    <circle cx="950" cy="150" r="130"/>
    <circle cx="950" cy="150" r="170"/>
  </g>
  
  <!-- 主标题 -->
  <text x="80" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" filter="url(#glow)">GPT-5.4</text>
  
  <!-- 副标题 -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="bold" fill="#00d4ff">AI 进入「干活时代」</text>
  
  <!-- 分隔线 -->
  <line x1="80" y1="320" x2="380" y2="320" stroke="#00d4ff" stroke-width="4"/>
  
  <!-- 报告信息 -->
  <text x="80" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#8888aa">2026 年 3 月科技圈 TOP 话题报告</text>
  
  <!-- 右下角装饰块 -->
  <rect x="820" y="420" width="300" height="130" fill="rgba(0,212,255,0.08)" rx="10"/>
  
  <!-- 关键数据 -->
  <text x="850" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#666688">📅 2026.03.06 发布</text>
  <text x="850" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#666688">⚡ Token -47% | 🎯 错误率 -33%</text>
  <text x="850" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#666688">💼 Excel/Sheets 原生支持</text>
  
  <!-- 作者信息 -->
  <text x="1120" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#666688" text-anchor="end">🚀 乔叔科技</text>
  
  <!-- 代码符号装饰 -->
  <text x="80" y="600" font-family="monospace" font-size="18" fill="rgba(0,212,255,0.4)">&lt;/&gt;</text>
  <text x="150" y="600" font-family="monospace" font-size="18" fill="rgba(0,212,255,0.4)">{ AI }</text>
</svg>
