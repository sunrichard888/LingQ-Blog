<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Agent nodes -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="40" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="3"/>
    <text x="0" y="5" font-family="sans-serif" font-size="24" fill="#3b82f6" text-anchor="middle">🤖</text>
  </g>
  
  <g transform="translate(300, 100)">
    <circle cx="0" cy="0" r="35" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="0" y="5" font-family="sans-serif" font-size="20" fill="#8b5cf6" text-anchor="middle">🏗️</text>
  </g>
  
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="35" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="0" y="5" font-family="sans-serif" font-size="20" fill="#8b5cf6" text-anchor="middle">💻</text>
  </g>
  
  <g transform="translate(500, 150)">
    <circle cx="0" cy="0" r="40" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="3"/>
    <text x="0" y="5" font-family="sans-serif" font-size="24" fill="#10b981" text-anchor="middle">✅</text>
  </g>
  
  <!-- Connection lines -->
  <line x1="140" y1="150" x2="265" y2="115" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="140" y1="150" x2="265" y2="185" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="335" y1="115" x2="460" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="335" y1="185" x2="460" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Main title -->
  <text x="600" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">
    OpenClaw 多 Agent 与 Pipeline
  </text>
  
  <text x="600" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="700" fill="url(#accent)" text-anchor="middle" letter-spacing="1">
    技能深度解析
  </text>
  
  <!-- Decorative line -->
  <line x1="350" y1="390" x2="850" y2="390" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">
    Ensemble/Pipeline/TDD 技能真相调查与 gh-issues 自动化多 Agent 技能发现
  </text>
  
  <!-- Tags -->
  <g transform="translate(600, 510)">
    <rect x="-240" y="-20" width="110" height="40" rx="20" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="2"/>
    <text x="-185" y="8" font-family="sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">#MultiAgent</text>
    
    <rect x="-115" y="-20" width="90" height="40" rx="20" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="-70" y="8" font-family="sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle">#TDD</text>
    
    <rect x="-10" y="-20" width="120" height="40" rx="20" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="2"/>
    <text x="50" y="8" font-family="sans-serif" font-size="14" fill="#10b981" text-anchor="middle">#gh-issues</text>
    
    <rect x="125" y="-20" width="110" height="40" rx="20" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="2"/>
    <text x="180" y="8" font-family="sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">#技能分析</text>
  </g>
  
  <!-- Date -->
  <text x="600" y="580" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    2026-03-24
  </text>
</svg>
