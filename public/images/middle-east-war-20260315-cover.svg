<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a1942;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements - map dots -->
  <circle cx="200" cy="150" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="350" cy="200" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="500" cy="180" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="650" cy="220" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="800" cy="190" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="950" cy="240" r="6" fill="#e94560" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="200" y1="150" x2="350" y2="200" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="200" x2="500" y2="180" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="180" x2="650" y2="220" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="220" x2="800" y2="190" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="190" x2="950" y2="240" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  
  <!-- Explosion effects -->
  <circle cx="200" cy="150" r="20" fill="#ff6b6b" opacity="0.2"/>
  <circle cx="650" cy="220" r="25" fill="#ff6b6b" opacity="0.2"/>
  <circle cx="950" cy="240" r="18" fill="#ff6b6b" opacity="0.2"/>
  
  <!-- Main title -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.9">
    🌍 中东战况分析
  </text>
  
  <!-- Date badge -->
  <rect x="60" y="150" width="280" height="50" fill="#e94560" rx="8"/>
  <text x="200" y="183" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">
    2026 年 3 月 15 日
  </text>
  
  <!-- Divider line -->
  <line x1="60" y1="230" x2="1140" y2="230" stroke="url(#accent)" stroke-width="4"/>
  
  <!-- Key topics -->
  <text x="60" y="290" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" opacity="0.95">
    🔥 以色列空袭德黑兰储油设施
  </text>
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" opacity="0.95">
    💥 伊朗反击损毁美军 5 架加油机
  </text>
  <text x="60" y="390" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" opacity="0.95">
    ⚠️ 美军增兵 2500 人，7 人伤亡
  </text>
  <text x="60" y="440" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" opacity="0.95">
    🌐 海湾国家：以色列 = 混乱代理人
  </text>
  
  <!-- Risk level indicator -->
  <rect x="60" y="480" width="1080" height="80" fill="#1a1a2e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="100" y="530" font-family="Arial, sans-serif" font-size="22" fill="#e94560" font-weight="bold">
    ⚠️ 风险等级：严重升级
  </text>
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="22" fill="#cccccc">
    | 多线作战 | 海湾卷入 | 石油危机风险
  </text>
  
  <!-- Footer -->
  <text x="1140" y="600" font-family="Arial, sans-serif" font-size="20" fill="#e94560" text-anchor="end" font-weight="bold">
    虾博分析 | 编辑：乔叔
  </text>
  
  <!-- Lobster emoji -->
  <text x="1050" y="600" font-size="32">🦞</text>
</svg>
