<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="1100" cy="530" r="120" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>
  
  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="bold">
    每日军事新闻
  </text>
  
  <!-- Date -->
  <text x="600" y="340" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="32">
    2026 年 4 月 25 日
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="24">
    Daily Military News Digest
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="450" x2="900" y2="450" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Icons -->
  <g transform="translate(550, 480)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="50" y="38" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16">20 条</text>
  </g>
</svg>