<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 - 蓝紫色调 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a1a6b;stop-opacity:1" />
    </linearGradient>
    
    <!-- 科技感网格 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(138, 180, 255, 0.1)" stroke-width="1"/>
    </pattern>
    
    <!-- 光晕效果 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8a95c7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8a95c7;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- 装饰光晕 -->
  <circle cx="200" cy="150" r="200" fill="url(#glow)"/>
  <circle cx="1000" cy="480" r="250" fill="url(#glow)"/>
  
  <!-- 中国地图轮廓（简化） -->
  <path d="M 150 200 Q 200 180 250 200 L 280 250 Q 300 300 280 350 L 250 380 Q 200 400 150 380 L 120 350 Q 100 300 120 250 Z" 
        fill="none" stroke="#c41e3a" stroke-width="2" opacity="0.6"/>
  
  <!-- AI 模型对比图表 -->
  <g transform="translate(650, 150)">
    <!-- 柱状图背景 -->
    <rect x="0" y="0" width="400" height="250" fill="rgba(0,0,0,0.3)" rx="10"/>
    
    <!-- 柱状图 -->
    <rect x="30" y="150" width="50" height="80" fill="#6366f1" rx="4"/>
    <rect x="110" y="120" width="50" height="110" fill="#8b5cf6" rx="4"/>
    <rect x="190" y="100" width="50" height="130" fill="#a855f7" rx="4"/>
    <rect x="270" y="80" width="50" height="150" fill="#c084fc" rx="4"/>
    <rect x="350" y="60" width="50" height="170" fill="#e879f9" rx="4"/>
    
    <!-- 图表标题 -->
    <text x="200" y="230" text-anchor="middle" fill="#c4b5fd" font-size="14" font-family="Arial">AI 模型能力对比</text>
  </g>
  
  <!-- UBS 研报元素 -->
  <g transform="translate(150, 420)">
    <rect x="0" y="0" width="180" height="60" fill="rgba(255,255,255,0.1)" rx="8" stroke="#8a95c7" stroke-width="1"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Arial">UBS RESEARCH</text>
    <text x="90" y="45" text-anchor="middle" fill="#c4b5fd" font-size="16" font-family="Arial" font-weight="bold">Target: 1380 HKD</text>
  </g>
  
  <!-- 主标题 -->
  <text x="600" y="120" text-anchor="middle" fill="#ffffff" font-size="42" font-family="Arial" font-weight="bold">
    别只盯着 DeepSeek
  </text>
  
  <!-- 副标题 -->
  <text x="600" y="180" text-anchor="middle" fill="#c4b5fd" font-size="28" font-family="Arial">
    中国又发布 5 款新 AI 模型
  </text>
  
  <!-- 高亮文本 -->
  <text x="600" y="260" text-anchor="middle" fill="#e879f9" font-size="36" font-family="Arial" font-weight="bold">
    UBS 最看好这个
  </text>
  
  <!-- 装饰线条 -->
  <line x1="400" y1="300" x2="800" y2="300" stroke="rgba(138, 149, 199, 0.5)" stroke-width="2"/>
  
  <!-- AI 节点网络 -->
  <g stroke="#8a95c7" stroke-width="1" opacity="0.4">
    <circle cx="100" cy="100" r="5" fill="#8a95c7"/>
    <circle cx="150" cy="80" r="4" fill="#8a95c7"/>
    <circle cx="200" cy="120" r="6" fill="#8a95c7"/>
    <circle cx="180" cy="180" r="4" fill="#8a95c7"/>
    <circle cx="120" cy="200" r="5" fill="#8a95c7"/>
    
    <line x1="100" y1="100" x2="150" y2="80"/>
    <line x1="150" y1="80" x2="200" y2="120"/>
    <line x1="200" y1="120" x2="180" y2="180"/>
    <line x1="180" y1="180" x2="120" y2="200"/>
    <line x1="120" y1="200" x2="100" y2="100"/>
  </g>
  
  <!-- 底部装饰 -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(138, 149, 199, 0.1)"/>
  
  <!-- 作者信息 -->
  <text x="1150" y="620" text-anchor="end" fill="#8a95c7" font-size="12" font-family="Arial">
    乔叔 | 2026.03.06
  </text>
</svg>
