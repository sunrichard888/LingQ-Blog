<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="url(#accent)" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#ffffff">每日军事新闻</text>
  
  <!-- Date -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e94560">2026 年 4 月 13 日 星期一</text>
  
  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0">国防 · 装备 · 军事科技</text>
  
  <!-- Decorative line -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#666666">LingQ-Blog 每日推送</text>
</svg>
