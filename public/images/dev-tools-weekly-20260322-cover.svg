<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#devGrad)"/>
  
  <!-- 代码装饰背景 -->
  <g opacity="0.08" fill="#fff" font-family="monospace" font-size="14">
    <text x="50" y="80">&lt;script&gt;</text>
    <text x="50" y="100">const agent = new AIAgent();</text>
    <text x="50" y="120">await agent.execute(task);</text>
    <text x="50" y="140">&lt;/script&gt;</text>
    <text x="50" y="180">function build() {</text>
    <text x="70" y="200">return 'awesome';</text>
    <text x="50" y="220">}</text>
    <text x="50" y="260">#include &lt;future&gt;</text>
    <text x="50" y="280">auto result = compile(code);</text>
  </g>
  
  <!-- 工具图标组合 -->
  <g transform="translate(900, 100)">
    <!-- 终端窗口 -->
    <rect x="0" y="0" width="180" height="140" rx="10" fill="rgba(0,0,0,0.3)" stroke="#fff" stroke-width="2"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#10b981"/>
    <text x="20" y="50" font-family="monospace" font-size="12" fill="#10b981">$ npm install</text>
    <text x="20" y="70" font-family="monospace" font-size="12" fill="#34d399">✓ Done in 1.2s</text>
    <text x="20" y="90" font-family="monospace" font-size="12" fill="#34d399">$ npm run dev</text>
    <text x="20" y="110" font-family="monospace" font-size="12" fill="#34d399">🚀 Server ready</text>
  </g>
  
  <!-- 装饰元素 -->
  <rect x="50" y="500" width="100" height="100" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <rect x="80" y="530" width="40" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  
  <!-- 标题文字 -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" opacity="0.95">🛠️ 开发者工具</text>
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.9">周报</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ffffff" opacity="0.85">2026 年 3 月 22 日</text>
  
  <!-- 本期亮点 -->
  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" opacity="0.85">✨ GitHub Copilot Workspace 发布</text>
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" opacity="0.85">✨ Cursor Team 版本上线</text>
  <text x="80" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" opacity="0.85">✨ VS Code 1.88 更新</text>
  
  <!-- 底部装饰线 -->
  <line x1="80" y1="550" x2="500" y2="550" stroke="#fff" stroke-width="3" opacity="0.5"/>
  <line x1="80" y1="565" x2="400" y2="565" stroke="#fff" stroke-width="3" opacity="0.3"/>
</svg>
