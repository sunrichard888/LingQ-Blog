<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern for tech feel -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,240,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Central AI Brain/Circuit Design -->
  <circle cx="600" cy="315" r="150" fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow)" opacity="0.3"/>
  <circle cx="600" cy="315" r="120" fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow)" opacity="0.4"/>
  <circle cx="600" cy="315" r="90" fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  
  <!-- 8 Tool Icons arranged in a circle -->
  <!-- Midjourney - Paint palette -->
  <g transform="translate(600,120)">
    <circle r="35" fill="rgba(0,240,255,0.1)" stroke="#00f0ff" stroke-width="2"/>
    <ellipse cx="0" cy="5" rx="20" ry="12" fill="#00f0ff" opacity="0.8"/>
    <circle cx="-8" cy="2" r="3" fill="#1a1a3e"/>
    <circle cx="0" cy="2" r="3" fill="#1a1a3e"/>
    <circle cx="8" cy="2" r="3" fill="#1a1a3e"/>
  </g>
  
  <!-- Stable Diffusion - Waveform -->
  <g transform="translate(740,190)">
    <circle r="35" fill="rgba(123,47,255,0.1)" stroke="#7b2fff" stroke-width="2"/>
    <path d="M -15 0 Q -7 -10, 0 0 Q 7 10, 15 0" fill="none" stroke="#7b2fff" stroke-width="3"/>
    <path d="M -15 5 Q -7 -5, 0 5 Q 7 15, 15 5" fill="none" stroke="#7b2fff" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- DALL-E 3 - Robot eye -->
  <g transform="translate(740,440)">
    <circle r="35" fill="rgba(255,0,170,0.1)" stroke="#ff00aa" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff00aa" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#ff00aa" opacity="0.6"/>
    <circle cx="3" cy="-3" r="3" fill="#ffffff"/>
  </g>
  
  <!-- Ideogram - Text A -->
  <g transform="translate(600,510)">
    <circle r="35" fill="rgba(0,255,150,0.1)" stroke="#00ff96" stroke-width="2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00ff96" text-anchor="middle">A</text>
  </g>
  
  <!-- Flux - Lightning bolt -->
  <g transform="translate(460,440)">
    <circle r="35" fill="rgba(255,200,0,0.1)" stroke="#ffc800" stroke-width="2"/>
    <path d="M -5 -15 L 5 -5 L -2 -5 L 5 15 L -5 5 L 2 5 Z" fill="#ffc800"/>
  </g>
  
  <!-- Leonardo - Artist brush -->
  <g transform="translate(320,190)">
    <circle r="35" fill="rgba(255,100,100,0.1)" stroke="#ff6464" stroke-width="2"/>
    <rect x="-3" y="-15" width="6" height="25" fill="#ff6464" rx="2"/>
    <ellipse cx="0" cy="15" rx="8" ry="5" fill="#ff6464"/>
  </g>
  
  <!-- Adobe Firefly - Sparkle -->
  <g transform="translate(460,190)">
    <circle r="35" fill="rgba(0,200,255,0.1)" stroke="#00c8ff" stroke-width="2"/>
    <path d="M 0 -20 L 3 -5 L 15 -5 L 5 5 L 8 20 L 0 12 L -8 20 L -5 5 L -15 -5 L -3 -5 Z" fill="#00c8ff"/>
  </g>
  
  <!-- Runway - Play button/Film -->
  <g transform="translate(320,440)">
    <circle r="35" fill="rgba(150,100,255,0.1)" stroke="#9664ff" stroke-width="2"/>
    <rect x="-12" y="-10" width="24" height="20" fill="none" stroke="#9664ff" stroke-width="2" rx="3"/>
    <polygon points="-4,-5 -4,5 6,0" fill="#9664ff"/>
  </g>
  
  <!-- Connection lines between icons -->
  <path d="M 600 155 L 600 225" stroke="rgba(0,240,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 705 210 L 705 285" stroke="rgba(123,47,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 705 345 L 705 420" stroke="rgba(255,0,170,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 635 475 L 635 510" stroke="rgba(0,255,150,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 565 510 L 565 475" stroke="rgba(255,200,0,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 495 420 L 495 345" stroke="rgba(255,100,100,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 495 210 L 495 285" stroke="rgba(0,200,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 355 210 L 355 285" stroke="rgba(150,100,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <path d="M 355 420 L 355 345" stroke="rgba(150,100,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Main Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#neonGradient)" text-anchor="middle" filter="url(#glow)">AI 生图工具大比拼</text>
  
  <!-- Subtitle -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.8">2025-2026 深度调研报告</text>
  
  <!-- 8 Tools label -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="16" fill="#00f0ff" text-anchor="middle" opacity="0.7">8 大主流工具全方位对比</text>
  
  <!-- Decorative corner elements -->
  <path d="M 0 0 L 100 0 L 100 5 L 5 5 L 5 100 L 0 100 Z" fill="#00f0ff" opacity="0.3"/>
  <path d="M 1200 0 L 1100 0 L 1100 5 L 1195 5 L 1195 100 L 1200 100 Z" fill="#00f0ff" opacity="0.3"/>
  <path d="M 0 630 L 100 630 L 100 625 L 5 625 L 5 530 L 0 530 Z" fill="#00f0ff" opacity="0.3"/>
  <path d="M 1200 630 L 1100 630 L 1100 625 L 1195 625 L 1195 530 L 1200 530 Z" fill="#00f0ff" opacity="0.3"/>
  
  <!-- Floating particles -->
  <circle cx="150" cy="200" r="2" fill="#00f0ff" opacity="0.6">
    <animate attributeName="cy" values="200;195;200" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="350" r="2" fill="#7b2fff" opacity="0.6">
    <animate attributeName="cy" values="350;355;350" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="500" r="2" fill="#ff00aa" opacity="0.6">
    <animate attributeName="cy" values="500;495;500" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="150" r="2" fill="#00ff96" opacity="0.6">
    <animate attributeName="cy" values="150;155;150" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
