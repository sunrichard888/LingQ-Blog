<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#e94560" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="600" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">每日军事新闻</text>
  
  <!-- Date -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e94560">2026 年 4 月 11 日</text>
  
  <!-- Subtitle -->
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0">国防 · 装备 · 国际军事动态</text>
  
  <!-- Icon/Decoration -->
  <g transform="translate(550, 350)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#accent)" opacity="0.2"/>
    <text x="50" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e94560">20 条精选</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#666666">LingQ-Blog 每日推送</text>
  
  <!-- Decorative lines -->
  <line x1="200" y1="260" x2="400" y2="260" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="260" x2="1000" y2="260" stroke="#e94560" stroke-width="2" opacity="0.5"/>
</svg>