<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 装饰性网格 -->
  <g stroke="#334155" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  
  <!-- 装饰性圆圈 -->
  <circle cx="1000" cy="100" r="150" fill="url(#accentGradient)" opacity="0.1"/>
  <circle cx="200" cy="500" r="100" fill="url(#accentGradient)" opacity="0.1"/>
  
  <!-- 主标题区域 -->
  <g transform="translate(80, 180)">
    <!-- 标签 -->
    <rect x="0" y="0" width="180" height="40" rx="20" fill="url(#accentGradient)" filter="url(#glow)"/>
    <text x="90" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">🔬 科技日报</text>
    
    <!-- 主标题 -->
    <text x="0" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff">2026 年 3 月 18 日</text>
    
    <!-- 副标题 -->
    <text x="0" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">AI 芯片大战升级 · 量子计算新突破</text>
    
    <!-- 分隔线 -->
    <line x1="0" y1="200" x2="800" y2="200" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- 亮点标签 -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="140" height="36" rx="6" fill="#334155" opacity="0.8"/>
      <text x="70" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">⚡ AI 芯片</text>
      
      <rect x="150" y="0" width="140" height="36" rx="6" fill="#334155" opacity="0.8"/>
      <text x="220" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a78bfa" text-anchor="middle">🔮 量子计算</text>
      
      <rect x="300" y="0" width="140" height="36" rx="6" fill="#334155" opacity="0.8"/>
      <text x="370" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#34d399" text-anchor="middle">🚀 太空探索</text>
    </g>
  </g>
  
  <!-- 右下角装饰 -->
  <g transform="translate(900, 450)">
    <!-- 芯片图案 -->
    <rect x="0" y="0" width="120" height="120" rx="12" fill="#1e293b" stroke="url(#accentGradient)" stroke-width="2"/>
    <rect x="20" y="20" width="80" height="80" rx="4" fill="#334155"/>
    <rect x="30" y="30" width="60" height="60" rx="2" fill="url(#accentGradient)" opacity="0.3"/>
    <circle cx="60" cy="60" r="15" fill="url(#accentGradient)" filter="url(#glow)"/>
    
    <!-- 连接线 -->
    <line x1="60" y1="0" x2="60" y2="15" stroke="#3b82f6" stroke-width="2"/>
    <line x1="60" y1="105" x2="60" y2="120" stroke="#3b82f6" stroke-width="2"/>
    <line x1="0" y1="60" x2="15" y2="60" stroke="#3b82f6" stroke-width="2"/>
    <line x1="105" y1="60" x2="120" y2="60" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- 底部信息 -->
  <text x="1100" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="end">🦞 LingQ Blog · 乔叔的科技日报</text>
</svg>
