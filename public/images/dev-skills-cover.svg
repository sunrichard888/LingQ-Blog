<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="50%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#718096"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="#4299e1" opacity="0.15"/>
  <circle cx="1100" cy="530" r="200" fill="#48bb78" opacity="0.15"/>
  <circle cx="600" cy="315" r="100" fill="#ed8936" opacity="0.1"/>
  
  <!-- Code brackets -->
  <text x="80" cy="200" font-size="200" fill="rgba(255,255,255,0.1)" font-family="monospace">&lt;</text>
  <text x="1050" cy="450" font-size="200" fill="rgba(255,255,255,0.1)" font-family="monospace">/&gt;</text>
  
  <!-- Main icon group -->
  <g transform="translate(600, 150)" filter="url(#glow)">
    <rect x="-70" y="-70" width="140" height="140" rx="28" fill="rgba(66,153,225,0.2)" stroke="rgba(66,153,225,0.4)" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-size="80">🛠️</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#title)" filter="url(#shadow)">OpenClaw 软件开发</text>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#title)" filter="url(#shadow)">Skills 完全清单</text>
  
  <!-- Subtitle -->
  <text x="600" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#cbd5e0" letter-spacing="3">DEVELOPMENT SKILLS GUIDE</text>
  
  <!-- Divider -->
  <line x1="250" y1="385" x2="950" y2="385" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Role cards -->
  <g transform="translate(120, 420)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="rgba(66,153,225,0.15)" stroke="rgba(66,153,225,0.4)" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" font-size="28">💻</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="600">前端开发</text>
  </g>
  
  <g transform="translate(320, 420)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="rgba(72,187,120,0.15)" stroke="rgba(72,187,120,0.4)" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" font-size="28">🔧</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="600">后端开发</text>
  </g>
  
  <g transform="translate(520, 420)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="rgba(237,137,54,0.15)" stroke="rgba(237,137,54,0.4)" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" font-size="28">🧪</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="600">测试/QA</text>
  </g>
  
  <g transform="translate(720, 420)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="rgba(159,122,234,0.15)" stroke="rgba(159,122,234,0.4)" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" font-size="28">🚀</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="600">DevOps</text>
  </g>
  
  <g transform="translate(920, 420)">
    <rect x="0" y="0" width="180" height="80" rx="12" fill="rgba(245,101,101,0.15)" stroke="rgba(245,101,101,0.4)" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" font-size="28">📊</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="600">全栈/架构</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui" font-size="14" fill="#a0aec0" letter-spacing="2">2026 · OpenClaw Skills · 提升开发效率</text>
  
  <!-- Corner decorations -->
  <circle cx="60" cy="570" r="6" fill="rgba(66,153,225,0.5)"/>
  <circle cx="85" cy="570" r="6" fill="rgba(72,187,120,0.5)"/>
  <circle cx="110" cy="570" r="6" fill="rgba(237,137,54,0.5)"/>
  
  <circle cx="1140" cy="60" r="6" fill="rgba(66,153,225,0.5)"/>
  <circle cx="1115" cy="60" r="6" fill="rgba(72,187,120,0.5)"/>
  <circle cx="1090" cy="60" r="6" fill="rgba(237,137,54,0.5)"/>
</svg>
