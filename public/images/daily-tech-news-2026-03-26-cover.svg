<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="150" fill="rgba(59,130,246,0.08)"/>
  <circle cx="200" cy="530" r="100" fill="rgba(139,92,246,0.08)"/>
  
  <!-- Main title -->
  <text x="600" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle">📰 每日科技新闻</text>
  
  <text x="600" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="2">Daily Tech News</text>
  
  <!-- Decorative line -->
  <line x1="350" y1="320" x2="850" y2="320" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Date -->
  <text x="600" y="370" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle">2026 年 3 月 26 日 · 星期三</text>
  
  <!-- Topic badges -->
  <g transform="translate(600, 440)">
    <rect x="-220" y="-24" width="100" height="48" rx="24" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
    <text x="-170" y="8" font-family="sans-serif" font-size="16" fill="#3b82f6" text-anchor="middle">🤖 AI</text>
    
    <rect x="-100" y="-24" width="120" height="48" rx="24" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="-40" y="8" font-family="sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle">💻 芯片</text>
    
    <rect x="40" y="-24" width="120" height="48" rx="24" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="8" font-family="sans-serif" font-size="16" fill="#10b981" text-anchor="middle">📱 大厂</text>
    
    <rect x="180" y="-24" width="120" height="48" rx="24" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="2"/>
    <text x="240" y="8" font-family="sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle">🚗 出行</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="540" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle">TOP 10 热点 · 过去 24 小时</text>
  
  <text x="600" y="580" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle">Powered by Tavily · LingQ-Blog</text>
</svg>
