<svg width="900" height="650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1c3f"/>
      <stop offset="100%" style="stop-color:#1a3a6e"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="650" fill="url(#bg1)"/>
  
  <!-- 标题 -->
  <text x="450" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">中国 AI 六小虎对比（2026 年）</text>
  
  <!-- 表格头部 -->
  <rect x="50" y="60" width="800" height="40" fill="rgba(255,255,255,0.1)" rx="5"/>
  <text x="150" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle">公司</text>
  <text x="300" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle">成立时间</text>
  <text x="450" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle">估值/市值</text>
  <text x="600" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle">状态</text>
  <text x="750" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle">特色</text>
  
  <!-- 智谱 -->
  <rect x="50" y="110" width="800" height="50" fill="rgba(255,255,255,0.05)" rx="5"/>
  <text x="150" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">智谱 AI</text>
  <text x="300" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2020</text>
  <text x="450" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">3232 亿港元</text>
  <text x="600" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">✅ 已上市</text>
  <text x="750" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">GLM 模型 + 代码</text>
  
  <!-- MiniMax -->
  <rect x="50" y="170" width="800" height="50" fill="rgba(255,255,255,0.05)" rx="5"/>
  <text x="150" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">MiniMax</text>
  <text x="300" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2021</text>
  <text x="450" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">3042 亿港元</text>
  <text x="600" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">✅ 已上市</text>
  <text x="750" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">70% 海外收入</text>
  
  <!-- 月之暗面 -->
  <rect x="50" y="230" width="800" height="50" fill="rgba(255,255,255,0.05)" rx="5"/>
  <text x="150" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">月之暗面</text>
  <text x="300" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2023</text>
  <text x="450" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffd700" text-anchor="middle">100 亿美元</text>
  <text x="600" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffd700" text-anchor="middle">💰 现金 100 亿</text>
  <text x="750" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">Kimi+ 全球化</text>
  
  <!-- 阶跃星辰 -->
  <rect x="50" y="290" width="800" height="50" fill="rgba(255,215,0,0.1)" rx="5" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <text x="150" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffd700" text-anchor="middle">阶跃星辰</text>
  <text x="300" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2023</text>
  <text x="450" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffd700" text-anchor="middle">40 亿美元</text>
  <text x="600" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffd700" text-anchor="middle">🚀 冲刺 IPO</text>
  <text x="750" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">多模态 + 端云</text>
  
  <!-- 百川智能 -->
  <rect x="50" y="350" width="800" height="50" fill="rgba(255,255,255,0.05)" rx="5"/>
  <text x="150" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">百川智能</text>
  <text x="300" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2023</text>
  <text x="450" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">约 30 亿美元</text>
  <text x="600" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">🔒 未上市</text>
  <text x="750" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">医疗 + 搜索</text>
  
  <!-- 零一万物 -->
  <rect x="50" y="410" width="800" height="50" fill="rgba(255,255,255,0.05)" rx="5"/>
  <text x="150" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">零一万物</text>
  <text x="300" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2023</text>
  <text x="450" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">约 25 亿美元</text>
  <text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">🔒 未上市</text>
  <text x="750" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">开源 + 海外</text>
  
  <!-- DeepSeek（参考） -->
  <rect x="50" y="470" width="800" height="50" fill="rgba(100,255,100,0.05)" rx="5" stroke="rgba(100,255,100,0.2)" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="150" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">DeepSeek</text>
  <text x="300" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">2023</text>
  <text x="450" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">约 50 亿美元</text>
  <text x="600" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">🔒 未上市</text>
  <text x="750" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">高性价比</text>
  
  <!-- 底部说明 -->
  <text x="450" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#888888" text-anchor="middle">💡 智谱、MiniMax 已港股上市，阶跃星辰冲刺 IPO 中</text>
  <text x="450" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#888888" text-anchor="middle">📊 估值数据截至 2026 年 2 月 | 市值单位：港元</text>
  <text x="450" y="610" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#888888" text-anchor="middle">🎯 DeepSeek 作为参考，非六小虎成员</text>
</svg>
