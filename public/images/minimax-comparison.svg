<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bg3)"/>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">中国 AI 独角兽市值对比（2026 年 2 月）</text>
  
  <!-- 柱状图 - 修正版 -->
  <!-- 比例：3500 亿=200px 高度，每 17.5 亿=1px -->
  
  <!-- 智谱 3232 亿 -->
  <rect x="80" y="84" width="90" height="185" fill="#ff6b6b" rx="5"/>
  <text x="125" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ff6b6b" text-anchor="middle">3232 亿</text>
  <text x="125" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">智谱</text>
  
  <!-- MiniMax 3042 亿 -->
  <rect x="190" y="95" width="90" height="174" fill="#4da6ff" rx="5"/>
  <text x="235" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#4da6ff" text-anchor="middle">3042 亿</text>
  <text x="235" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">MiniMax</text>
  
  <!-- 京东 2800 亿 -->
  <rect x="300" y="109" width="90" height="160" fill="#f5a623" rx="5"/>
  <text x="345" y="99" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#f5a623" text-anchor="middle">2800 亿</text>
  <text x="345" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">京东</text>
  
  <!-- 快手 2500 亿 -->
  <rect x="410" y="126" width="90" height="143" fill="#a8a8a8" rx="5"/>
  <text x="455" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#a8a8a8" text-anchor="middle">2500 亿</text>
  <text x="455" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">快手</text>
  
  <!-- 月之暗面 1000 亿 -->
  <rect x="520" y="212" width="90" height="57" fill="#95e1d3" rx="5"/>
  <text x="565" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#95e1d3" text-anchor="middle">1000 亿</text>
  <text x="565" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">月之暗面</text>
  
  <!-- Y 轴标签 -->
  <text x="50" y="89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">3000 亿</text>
  <text x="50" y="139" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">2500 亿</text>
  <text x="50" y="189" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">2000 亿</text>
  <text x="50" y="239" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="end">1000 亿</text>
  
  <!-- Y 轴线 -->
  <line x1="60" y1="84" x2="60" y2="269" stroke="#444444" stroke-width="2"/>
  
  <!-- 底部说明 -->
  <text x="400" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#888888" text-anchor="middle">💡 成立仅几年的 AI 公司市值已超越京东、快手等传统互联网巨头</text>
  <text x="400" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#666666" text-anchor="middle">数据来源：公开市场数据 | 单位：港元</text>
</svg>
