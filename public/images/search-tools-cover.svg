<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#e94560" opacity="0.2"/>
  <circle cx="1100" cy="530" r="150" fill="#533483" opacity="0.2"/>
  <circle cx="600" cy="315" r="100" fill="#0f3460" opacity="0.3"/>
  
  <!-- Main icon -->
  <text x="600" y="150" text-anchor="middle" font-size="100" filter="url(#glow)">🔍</text>
  
  <!-- Title -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="url(#title)">搜索工具全景指南</text>
  
  <!-- Subtitle -->
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#a0aec0" letter-spacing="4">SEARCH TOOLS COMPARISON</text>
  
  <!-- Tool cards -->
  <g transform="translate(150, 320)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="45" text-anchor="middle" font-size="40">🛠️</text>
    <text x="70" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fff" font-weight="600">web_search</text>
  </g>
  
  <g transform="translate(310, 320)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="45" text-anchor="middle" font-size="40">🎯</text>
    <text x="70" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fff" font-weight="600">tavily</text>
  </g>
  
  <g transform="translate(470, 320)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="45" text-anchor="middle" font-size="40">🌐</text>
    <text x="70" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fff" font-weight="600">desearch</text>
  </g>
  
  <g transform="translate(630, 320)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="45" text-anchor="middle" font-size="40">📄</text>
    <text x="70" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fff" font-weight="600">web_fetch</text>
  </g>
  
  <g transform="translate(790, 320)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="45" text-anchor="middle" font-size="40">🖥️</text>
    <text x="70" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fff" font-weight="600">browser</text>
  </g>
  
  <g transform="translate(950, 320)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="70" y="45" text-anchor="middle" font-size="40">🧾</text>
    <text x="70" y="75" text-anchor="middle" font-family="system-ui" font-size="16" fill="#fff" font-weight="600">summarize</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui" font-size="16" fill="#4a5568" letter-spacing="1">OpenClaw 搜索技能完全对比分析 · 2026</text>
</svg>
