<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <path d="M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500" stroke="#ffffff" stroke-width="1"/>
    <path d="M100 0 L100 630 M200 0 L200 630 M300 0 L300 630 M400 0 L400 630 M500 0 L500 630 M600 0 L600 630 M700 0 L700 630 M800 0 L800 630 M900 0 L900 630 M1000 0 L1000 630 M1100 0 L1100 630" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="1100" cy="530" r="80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>
  
  <!-- Main title -->
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">每日军事新闻</text>
  
  <!-- Date -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e94560">2026 年 4 月 9 日 · 星期四</text>
  
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0">Defense &amp; Military News Daily</text>
  
  <!-- Decorative line -->
  <line x1="300" y1="360" x2="900" y2="360" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
  
  <!-- Icon placeholder -->
  <g transform="translate(550, 400)">
    <rect x="0" y="0" width="100" height="100" rx="10" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M30 50 L45 65 L70 35" stroke="url(#accent)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666666">LingQ-Blog · 奇数天军事专题</text>
</svg>
