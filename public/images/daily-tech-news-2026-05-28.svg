<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ffd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 装饰性电路图案 -->
  <g opacity="0.1" fill="none" stroke="#00d4ff" stroke-width="1">
    <path d="M50,100 L150,100 L150,200 L250,200"/>
    <path d="M100,300 L200,300 L200,400 L300,400"/>
    <path d="M800,50 L900,50 L900,150 L1000,150"/>
    <path d="M900,250 L1000,250 L1000,350 L1100,350"/>
    <circle cx="250" cy="200" r="4"/>
    <circle cx="300" cy="400" r="4"/>
    <circle cx="1000" cy="150" r="4"/>
    <circle cx="1100" cy="350" r="4"/>
  </g>
  
  <!-- 芯片图标 -->
  <g transform="translate(950, 450)" filter="url(#glow)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
    <line x1="-60" y1="-25" x2="-75" y2="-25" stroke="url(#accentGradient)" stroke-width="2"/>
    <line x1="-60" y1="0" x2="-75" y2="0" stroke="url(#accentGradient)" stroke-width="2"/>
    <line x1="-60" y1="25" x2="-75" y2="25" stroke="url(#accentGradient)" stroke-width="2"/>
    <line x1="60" y1="-25" x2="75" y2="-25" stroke="url(#accentGradient)" stroke-width="2"/>
    <line x1="60" y1="0" x2="75" y2="0" stroke="url(#accentGradient)" stroke-width="2"/>
    <line x1="60" y1="25" x2="75" y2="25" stroke="url(#accentGradient)" stroke-width="2"/>
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="url(#accentGradient)" opacity="0.3"/>
  </g>
  
  <!-- 主标题 -->
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    每日科技新闻
  </text>
  
  <!-- 日期 -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="36" fill="#00d4ff">
    2026年5月28日 · 星期四
  </text>
  
  <!-- 分割线 -->
  <line x1="80" y1="340" x2="500" y2="340" stroke="url(#accentGradient)" stroke-width="4" rx="2"/>
  
  <!-- 副标题 -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="24" fill="#a0a0c0">
    AI · 芯片 · 半导体 · 前沿科技
  </text>
  
  <!-- 关键词标签 -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="80" height="36" rx="18" fill="url(#accentGradient)" opacity="0.8"/>
    <text x="40" y="24" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff" font-weight="bold">AI</text>
  </g>
  <g transform="translate(180, 460)">
    <rect x="0" y="0" width="100" height="36" rx="18" fill="url(#accentGradient)" opacity="0.8"/>
    <text x="50" y="24" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff" font-weight="bold">芯片</text>
  </g>
  <g transform="translate(300, 460)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="url(#accentGradient)" opacity="0.8"/>
    <text x="60" y="24" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff" font-weight="bold">半导体</text>
  </g>
  
  <!-- 底部标识 -->
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="20" fill="#606090">
    虾博 XiaBo · 自动生成
  </text>
  
  <!-- 右侧装饰圆环 -->
  <circle cx="1050" cy="150" r="80" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  <circle cx="1050" cy="150" r="60" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.3"/>
  <circle cx="1050" cy="150" r="40" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.2"/>
</svg>