<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 科技感网格 -->
  <g opacity="0.1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- 发光效果 -->
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="url(#glowGradient)"/>
  
  <!-- 芯片图标装饰 -->
  <g transform="translate(100, 150)" opacity="0.15">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#3b82f6"/>
    <rect x="15" y="15" width="90" height="90" rx="5" fill="#0f172a"/>
    <line x1="0" y1="60" x2="-20" y2="60" stroke="#3b82f6" stroke-width="4"/>
    <line x1="120" y1="60" x2="140" y2="60" stroke="#3b82f6" stroke-width="4"/>
    <line x1="60" y1="0" x2="60" y2="-20" stroke="#3b82f6" stroke-width="4"/>
    <line x1="60" y1="120" x2="60" y2="140" stroke="#3b82f6" stroke-width="4"/>
  </g>
  
  <g transform="translate(980, 400)" opacity="0.15">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#8b5cf6"/>
    <rect x="15" y="15" width="90" height="90" rx="5" fill="#0f172a"/>
    <line x1="0" y1="60" x2="-20" y2="60" stroke="#8b5cf6" stroke-width="4"/>
    <line x1="120" y1="60" x2="140" y2="60" stroke="#8b5cf6" stroke-width="4"/>
    <line x1="60" y1="0" x2="60" y2="-20" stroke="#8b5cf6" stroke-width="4"/>
    <line x1="60" y1="120" x2="60" y2="140" stroke="#8b5cf6" stroke-width="4"/>
  </g>
  
  <!-- 装饰性圆环 -->
  <circle cx="1050" cy="100" r="60" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <circle cx="150" cy="530" r="80" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
  
  <!-- 主标题 -->
  <text x="600" y="260" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="56" font-weight="bold" fill="#ffffff">
    每日科技新闻速报
  </text>
  
  <!-- 副标题 -->
  <text x="600" y="330" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="32" fill="#94a3b8">
    AI · 芯片 · 半导体 · 全球科技前沿
  </text>
  
  <!-- 日期标签 -->
  <rect x="450" y="380" width="300" height="60" rx="30" fill="url(#accentGradient)"/>
  <text x="600" y="420" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#ffffff">
    2026年5月18日
  </text>
  
  <!-- 底部标签 -->
  <g transform="translate(600, 520)">
    <rect x="-180" y="0" width="360" height="50" rx="25" fill="rgba(255,255,255,0.1)"/>
    <text x="0" y="33" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#cbd5e1">
      🦐 虾博 · 每日科技速递
    </text>
  </g>
  
  <!-- 装饰线条 -->
  <line x1="200" y1="480" x2="400" y2="480" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="480" x2="1000" y2="480" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  
  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentGradient)"/>
</svg>
