<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Circuit pattern background -->
  <g opacity="0.1">
    <path d="M100 100 L300 100 L300 200 L500 200" stroke="#00d9ff" stroke-width="2" fill="none"/>
    <path d="M900 530 L700 530 L700 430 L500 430" stroke="#00d9ff" stroke-width="2" fill="none"/>
    <circle cx="100" cy="100" r="5" fill="#00d9ff"/>
    <circle cx="300" cy="100" r="5" fill="#00d9ff"/>
    <circle cx="300" cy="200" r="5" fill="#00d9ff"/>
    <circle cx="500" cy="200" r="5" fill="#00d9ff"/>
    <circle cx="900" cy="530" r="5" fill="#00d9ff"/>
    <circle cx="700" cy="530" r="5" fill="#00d9ff"/>
    <circle cx="700" cy="430" r="5" fill="#00d9ff"/>
    <circle cx="500" cy="430" r="5" fill="#00d9ff"/>
  </g>
  
  <!-- Chip icon -->
  <g transform="translate(900, 150)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="120" rx="15" fill="url(#chipGradient)"/>
    <rect x="20" y="20" width="80" height="80" rx="8" fill="#1a1a2e"/>
    <rect x="30" y="30" width="60" height="60" rx="5" fill="url(#chipGradient)" opacity="0.3"/>
    <!-- Chip pins -->
    <g fill="#00d9ff">
      <rect x="-10" y="30" width="10" height="8"/>
      <rect x="-10" y="50" width="10" height="8"/>
      <rect x="-10" y="70" width="10" height="8"/>
      <rect x="120" y="30" width="10" height="8"/>
      <rect x="120" y="50" width="10" height="8"/>
      <rect x="120" y="70" width="10" height="8"/>
      <rect x="30" y="-10" width="8" height="10"/>
      <rect x="50" y="-10" width="8" height="10"/>
      <rect x="70" y="-10" width="8" height="10"/>
      <rect x="30" y="120" width="8" height="10"/>
      <rect x="50" y="120" width="8" height="10"/>
      <rect x="70" y="120" width="8" height="10"/>
    </g>
  </g>
  
  <!-- Main title -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">
    每日科技新闻
  </text>
  
  <!-- Date -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="32" fill="#00d9ff">
    2026 年 4 月 14 日
  </text>
  
  <!-- Subtitle box -->
  <rect x="80" y="280" width="700" height="180" rx="10" fill="#ffffff" opacity="0.1"/>
  <rect x="80" y="280" width="5" height="180" rx="2" fill="#00d9ff"/>
  
  <!-- Headlines -->
  <text x="100" y="325" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="bold">
    🔥 今日焦点
  </text>
  
  <text x="100" y="365" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0">
    • 台积电 Q1 净利润暴涨 50% 创新高
  </text>
  
  <text x="100" y="395" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0">
    • 谷歌扩大与英特尔 AI 芯片合作
  </text>
  
  <text x="100" y="425" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0">
    • 苹果自研 AI 服务器芯片 Baltra
  </text>
  
  <text x="100" y="455" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0">
    • 新型芯片可承受 1300°F 高温
  </text>
  
  <!-- Tags -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="100" height="36" rx="18" fill="#00d9ff" opacity="0.2"/>
    <text x="50" y="24" font-family="Arial, sans-serif" font-size="14" fill="#00d9ff" text-anchor="middle">#AI 芯片</text>
    
    <rect x="115" y="0" width="100" height="36" rx="18" fill="#00d9ff" opacity="0.2"/>
    <text x="165" y="24" font-family="Arial, sans-serif" font-size="14" fill="#00d9ff" text-anchor="middle">#半导体</text>
    
    <rect x="230" y="0" width="100" height="36" rx="18" fill="#00d9ff" opacity="0.2"/>
    <text x="280" y="24" font-family="Arial, sans-serif" font-size="14" fill="#00d9ff" text-anchor="middle">#人工智能</text>
    
    <rect x="345" y="0" width="100" height="36" rx="18" fill="#00d9ff" opacity="0.2"/>
    <text x="395" y="24" font-family="Arial, sans-serif" font-size="14" fill="#00d9ff" text-anchor="middle">#科技新闻</text>
  </g>
  
  <!-- Footer -->
  <text x="1120" y="600" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">
    虾博 XiaBo | LingQ-Blog
  </text>
  
  <!-- Decorative elements -->
  <circle cx="1100" cy="100" r="30" fill="#00d9ff" opacity="0.1"/>
  <circle cx="1150" cy="80" r="20" fill="#00d9ff" opacity="0.15"/>
  <circle cx="100" cy="550" r="40" fill="#00d9ff" opacity="0.05"/>
</svg>
