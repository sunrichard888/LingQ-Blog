<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Chess board pattern -->
  <g transform="translate(50, 50)" opacity="0.1">
    <rect x="0" y="0" width="400" height="400" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="0" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="0" y2="400" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">
    OpenClaw Ensemble + Pipeline
  </text>
  
  <text x="600" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="2">
    TDD 开发中国象棋项目实践
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="340" x2="900" y2="340" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Stats -->
  <g transform="translate(600, 420)">
    <text x="0" y="0" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.9)" text-anchor="middle">
      📅 6 天开发 | 📝 180 个测试 | ✅ 94.4% 通过率 | 💻 ~8,200 行代码
    </text>
  </g>
  
  <!-- Tags -->
  <g transform="translate(600, 500)">
    <rect x="-200" y="-20" width="100" height="40" rx="20" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="2"/>
    <text x="-150" y="8" font-family="sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">#OpenClaw</text>
    
    <rect x="-80" y="-20" width="80" height="40" rx="20" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="2"/>
    <text x="-40" y="8" font-family="sans-serif" font-size="14" fill="#ef4444" text-anchor="middle">#TDD</text>
    
    <rect x="20" y="-20" width="100" height="40" rx="20" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="2"/>
    <text x="70" y="8" font-family="sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">#FactoryMode</text>
    
    <rect x="140" y="-20" width="100" height="40" rx="20" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="2"/>
    <text x="190" y="8" font-family="sans-serif" font-size="14" fill="#10b981" text-anchor="middle">#AI</text>
  </g>
  
  <!-- Date -->
  <text x="600" y="570" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    2026-03-24
  </text>
</svg>
