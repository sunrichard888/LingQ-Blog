<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#e94560" opacity="0.08"/>
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)"/>
  
  <!-- Title -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">每日军事新闻</text>
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="36" fill="#a0a0a0" text-anchor="middle">Daily Military News</text>
  
  <!-- Date -->
  <rect x="450" y="350" width="300" height="60" rx="30" fill="url(#accent)"/>
  <text x="600" y="390" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">2026.05.19</text>
  
  <!-- Tags -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0" text-anchor="middle">国防 · 装备 · 国际军事动态</text>
  
  <!-- Footer -->
  <text x="600" y="615" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">🦐 虾秘 · XiaBo Daily News</text>
</svg>
