<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 装饰性电路图案 -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="300" y2="100" stroke="#00d4ff" stroke-width="2"/>
    <line x1="300" y1="100" x2="300" y2="200" stroke="#00d4ff" stroke-width="2"/>
    <line x1="300" y1="200" x2="500" y2="200" stroke="#00d4ff" stroke-width="2"/>
    <line x1="500" y1="200" x2="500" y2="350" stroke="#00d4ff" stroke-width="2"/>
    <line x1="500" y1="350" x2="700" y2="350" stroke="#00d4ff" stroke-width="2"/>
    <line x1="700" y1="350" x2="700" y2="500" stroke="#00d4ff" stroke-width="2"/>
    <line x1="700" y1="500" x2="900" y2="500" stroke="#00d4ff" stroke-width="2"/>
    <line x1="900" y1="500" x2="900" y2="630" stroke="#00d4ff" stroke-width="2"/>
    
    <line x1="1200" y1="150" x2="1000" y2="150" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="1000" y1="150" x2="1000" y2="300" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="1000" y1="300" x2="800" y2="300" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="800" y1="300" x2="800" y2="450" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="800" y1="450" x2="600" y2="450" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="600" y1="450" x2="600" y2="550" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="600" y1="550" x2="400" y2="550" stroke="#7b2cbf" stroke-width="2"/>
  </g>
  
  <!-- 芯片图标装饰 -->
  <g transform="translate(100, 280)" filter="url(#glow)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="#00d4ff" stroke-width="3"/>
    <line x1="0" y1="20" x2="-15" y2="20" stroke="#00d4ff" stroke-width="2"/>
    <line x1="0" y1="40" x2="-15" y2="40" stroke="#00d4ff" stroke-width="2"/>
    <line x1="0" y1="60" x2="-15" y2="60" stroke="#00d4ff" stroke-width="2"/>
    <line x1="80" y1="20" x2="95" y2="20" stroke="#00d4ff" stroke-width="2"/>
    <line x1="80" y1="40" x2="95" y2="40" stroke="#00d4ff" stroke-width="2"/>
    <line x1="80" y1="60" x2="95" y2="60" stroke="#00d4ff" stroke-width="2"/>
    <line x1="20" y1="0" x2="20" y2="-15" stroke="#00d4ff" stroke-width="2"/>
    <line x1="40" y1="0" x2="40" y2="-15" stroke="#00d4ff" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="-15" stroke="#00d4ff" stroke-width="2"/>
    <line x1="20" y1="80" x2="20" y2="95" stroke="#00d4ff" stroke-width="2"/>
    <line x1="40" y1="80" x2="40" y2="95" stroke="#00d4ff" stroke-width="2"/>
    <line x1="60" y1="80" x2="60" y2="95" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="40" cy="40" r="12" fill="#00d4ff" opacity="0.5"/>
  </g>
  
  <g transform="translate(1020, 280)" filter="url(#glow)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="#7b2cbf" stroke-width="3"/>
    <line x1="0" y1="20" x2="-15" y2="20" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="0" y1="40" x2="-15" y2="40" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="0" y1="60" x2="-15" y2="60" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="80" y1="20" x2="95" y2="20" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="80" y1="40" x2="95" y2="40" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="80" y1="60" x2="95" y2="60" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="20" y1="0" x2="20" y2="-15" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="40" y1="0" x2="40" y2="-15" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="-15" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="20" y1="80" x2="20" y2="95" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="40" y1="80" x2="40" y2="95" stroke="#7b2cbf" stroke-width="2"/>
    <line x1="60" y1="80" x2="60" y2="95" stroke="#7b2cbf" stroke-width="2"/>
    <circle cx="40" cy="40" r="12" fill="#7b2cbf" opacity="0.5"/>
  </g>
  
  <!-- 主标题 -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    每日科技新闻
  </text>
  
  <!-- 日期 -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="36" fill="#00d4ff" text-anchor="middle">
    2026年5月30日 · 星期六
  </text>
  
  <!-- 分隔线 -->
  <rect x="400" y="340" width="400" height="4" rx="2" fill="url(#accentGradient)"/>
  
  <!-- 副标题标签 -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="28" fill="#a0a0a0" text-anchor="middle">
    AI · 芯片 · 半导体 · 前沿科技
  </text>
  
  <!-- 关键词标签 -->
  <g transform="translate(600, 480)">
    <rect x="-200" y="-20" width="100" height="40" rx="20" fill="#00d4ff" opacity="0.2"/>
    <text x="-150" y="7" font-family="Arial, sans-serif" font-size="18" fill="#00d4ff" text-anchor="middle">AI芯片</text>
    
    <rect x="-80" y="-20" width="100" height="40" rx="20" fill="#7b2cbf" opacity="0.2"/>
    <text x="-30" y="7" font-family="Arial, sans-serif" font-size="18" fill="#7b2cbf" text-anchor="middle">存储芯片</text>
    
    <rect x="40" y="-20" width="100" height="40" rx="20" fill="#00d4ff" opacity="0.2"/>
    <text x="90" y="7" font-family="Arial, sans-serif" font-size="18" fill="#00d4ff" text-anchor="middle">华为</text>
    
    <rect x="150" y="-20" width="80" height="40" rx="20" fill="#7b2cbf" opacity="0.2"/>
    <text x="190" y="7" font-family="Arial, sans-serif" font-size="18" fill="#7b2cbf" text-anchor="middle">XCENA</text>
  </g>
  
  <!-- 底部品牌 -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="middle">
    虾博 XiaBo · 每日科技新闻推送
  </text>
  
  <!-- 角落装饰点 -->
  <circle cx="50" cy="50" r="8" fill="#00d4ff" opacity="0.6"/>
  <circle cx="50" cy="580" r="6" fill="#7b2cbf" opacity="0.6"/>
  <circle cx="1150" cy="50" r="6" fill="#7b2cbf" opacity="0.6"/>
  <circle cx="1150" cy="580" r="8" fill="#00d4ff" opacity="0.6"/>
</svg>
