<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1a2e1a"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg3)"/>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">🛡️ AI 时代的安全岗位：这些能力难以替代</text>
  
  <!-- 左侧：危险区 -->
  <rect x="30" y="70" width="350" height="200" fill="rgba(255,100,100,0.1)" rx="10" stroke="rgba(255,100,100,0.3)" stroke-width="2"/>
  <text x="205" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#ff6b6b" text-anchor="middle">⚠️ 危险区：重复性 + 规则驱动</text>
  
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc">
    <text x="50" y="130">❌ 数据录入与整理</text>
    <text x="50" y="155">❌ 基础翻译与校对</text>
    <text x="50" y="180">❌ 标准化客服应答</text>
    <text x="50" y="205">❌ 基础会计与报税</text>
    <text x="50" y="230">❌ 简单代码编写</text>
    <text x="50" y="255">❌ 常规法律文件起草</text>
  </g>
  
  <!-- 右侧：安全区 -->
  <rect x="420" y="70" width="350" height="200" fill="rgba(100,255,100,0.1)" rx="10" stroke="rgba(100,255,100,0.3)" stroke-width="2"/>
  <text x="595" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#4ade80" text-anchor="middle">✅ 安全区：创造力 + 人际互动</text>
  
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc">
    <text x="440" y="130">✓ 复杂战略规划</text>
    <text x="440" y="155">✓ 高度创造性工作</text>
    <text x="440" y="180">✓ 深度人际互动</text>
    <text x="440" y="205">✓ 跨领域整合决策</text>
    <text x="440" y="230">✓ 情感支持与关怀</text>
    <text x="440" y="255">✓ 物理世界操作</text>
  </g>
  
  <!-- 底部：具体职业对比 -->
  <text x="400" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">📊 具体职业对比</text>
  
  <!-- 对比表格 -->
  <rect x="50" y="330" width="700" height="120" fill="rgba(255,255,255,0.05)" rx="8"/>
  
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13">
    <!-- 表头 -->
    <text x="150" y="355" font-weight="bold" fill="#ff6b6b" text-anchor="middle">高危岗位</text>
    <text x="400" y="355" font-weight="bold" fill="#ffd700" text-anchor="middle">转型方向</text>
    <text x="650" y="355" font-weight="bold" fill="#4ade80" text-anchor="middle">安全岗位</text>
    
    <!-- 行 1 -->
    <text x="150" y="380" fill="#cccccc" text-anchor="middle">初级程序员</text>
    <text x="400" y="380" fill="#ffffff" text-anchor="middle">AI 工具专家</text>
    <text x="650" y="380" fill="#cccccc" text-anchor="middle">系统架构师</text>
    
    <!-- 行 2 -->
    <text x="150" y="405" fill="#cccccc" text-anchor="middle">翻译</text>
    <text x="400" y="405" fill="#ffffff" text-anchor="middle">跨文化顾问</text>
    <text x="650" y="405" fill="#cccccc" text-anchor="middle">外交/谈判专家</text>
    
    <!-- 行 3 -->
    <text x="150" y="430" fill="#cccccc" text-anchor="middle">会计</text>
    <text x="400" y="430" fill="#ffffff" text-anchor="middle">财务战略顾问</text>
    <text x="650" y="430" fill="#cccccc" text-anchor="middle">投资分析师</text>
  </g>
  
  <!-- 底部说明 -->
  <text x="400" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">💡 核心逻辑：AI 替代的是任务，不是职业。转型比抵抗更重要。</text>
</svg>
