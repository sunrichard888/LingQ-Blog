<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  
  <!-- Military icon (shield) -->
  <g transform="translate(50, 50)">
    <path d="M50 10 L90 30 L90 70 L50 100 L10 70 L10 30 Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M50 25 L75 37.5 L75 62.5 L50 75 L25 62.5 L25 37.5 Z" fill="url(#accent)" fill-opacity="0.3"/>
    <text x="50" y="58" text-anchor="middle" fill="#e94560" font-size="24" font-weight="bold">★</text>
  </g>
  
  <!-- Title -->
  <text x="150" y="80" fill="#ffffff" font-size="48" font-weight="bold" font-family="Arial, sans-serif">每日军事新闻</text>
  <text x="150" y="110" fill="#e94560" font-size="24" font-family="Arial, sans-serif">Daily Military News</text>
  
  <!-- Date -->
  <text x="1050" y="80" fill="#94a3b8" font-size="28" font-family="Arial, sans-serif" text-anchor="end">2026 年 4 月 1 日</text>
  <text x="1050" y="105" fill="#64748b" font-size="18" font-family="Arial, sans-serif" text-anchor="end">April 1, 2026</text>
  
  <!-- Divider -->
  <line x1="50" y1="140" x2="1150" y2="140" stroke="url(#accent)" stroke-width="2"/>
  
  <!-- Main headlines -->
  <text x="50" y="190" fill="#ffffff" font-size="22" font-weight="bold" font-family="Arial, sans-serif">🔴 今日焦点</text>
  
  <g transform="translate(50, 220)">
    <text x="0" y="0" fill="#e2e8f0" font-size="16" font-family="Arial, sans-serif">• 美以"史诗狂怒"行动：伊朗最高领袖哈梅内伊身亡</text>
    <text x="0" y="30" fill="#e2e8f0" font-size="16" font-family="Arial, sans-serif">• 美军加速 AI 作战集成，武器"工厂到前线"快速交付</text>
    <text x="0" y="60" fill="#e2e8f0" font-size="16" font-family="Arial, sans-serif">• 伊朗关闭霍尔木兹海峡，冲突或引发全球油价震荡</text>
    <text x="0" y="90" fill="#e2e8f0" font-size="16" font-family="Arial, sans-serif">• 中国预备役人员证正式启用，全军组织 2100+ 军营开放</text>
  </g>
  
  <!-- Secondary section -->
  <text x="50" y="360" fill="#ffffff" font-size="22" font-weight="bold" font-family="Arial, sans-serif">📊 国防动态</text>
  
  <g transform="translate(50, 390)">
    <text x="0" y="0" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 国防部回应日本炒作：日防卫预算连续 14 年增长</text>
    <text x="0" y="25" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 055 型驱逐舰东莞舰、安庆舰完成首次编队训练</text>
    <text x="0" y="50" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 中越"3+3"战略对话机制首次部长级会议举行</text>
    <text x="0" y="75" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 中国将领吴俊辉出任联合国南苏丹特派团部队指挥官</text>
  </g>
  
  <!-- Tech section -->
  <text x="50" y="500" fill="#ffffff" font-size="22" font-weight="bold" font-family="Arial, sans-serif">⚔️ 装备前沿</text>
  
  <g transform="translate(50, 530)">
    <text x="0" y="0" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 意大利首艘 U212 潜艇铺设龙骨，2029 年交付</text>
    <text x="0" y="25" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 韩华防务推出 AS9"亨斯迈"自行榴弹炮</text>
    <text x="0" y="50" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">• 丹麦 HD-606 重型无人机：全球首款大口径火力无人机</text>
  </g>
  
  <!-- Footer -->
  <text x="1150" y="610" fill="#475569" font-size="14" font-family="Arial, sans-serif" text-anchor="end">LingQ-Blog | 奇数天军事专题</text>
</svg>
