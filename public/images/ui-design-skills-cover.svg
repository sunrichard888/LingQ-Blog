<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#ffffff" opacity="0.1"/>
  <circle cx="600" cy="315" r="120" fill="#ffffff" opacity="0.05"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main icon group -->
  <g transform="translate(600, 140)" filter="url(#glow)">
    <circle cx="0" cy="0" r="60" fill="rgba(255,255,255,0.2)"/>
    <text x="0" y="20" text-anchor="middle" font-size="80">🎨</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#title)" filter="url(#shadow)">UI 设计 Skills 指南</text>
  
  <!-- Subtitle -->
  <text x="600" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#ffffff" opacity="0.9" letter-spacing="3">UI DESIGN SKILLS GUIDE</text>
  
  <!-- Divider line -->
  <line x1="300" y1="310" x2="900" y2="310" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Skill cards -->
  <g transform="translate(150, 340)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="130" height="90" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="32">🎯</text>
    <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">ui-ux-design</text>
  </g>
  
  <g transform="translate(300, 340)">
    <!-- Card 2 -->
    <rect x="0" y="0" width="130" height="90" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="32">💻</text>
    <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">frontend</text>
  </g>
  
  <g transform="translate(450, 340)">
    <!-- Card 3 -->
    <rect x="0" y="0" width="130" height="90" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="32">🧩</text>
    <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">shadcn-ui</text>
  </g>
  
  <g transform="translate(600, 340)">
    <!-- Card 4 -->
    <rect x="0" y="0" width="130" height="90" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="32">🎨</text>
    <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">tailwind</text>
  </g>
  
  <g transform="translate(750, 340)">
    <!-- Card 5 -->
    <rect x="0" y="0" width="130" height="90" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="32">🖼️</text>
    <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">canvas</text>
  </g>
  
  <g transform="translate(900, 340)">
    <!-- Card 6 -->
    <rect x="0" y="0" width="130" height="90" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="32">✨</text>
    <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">graphic</text>
  </g>
  
  <!-- Feature badges -->
  <g transform="translate(350, 470)">
    <rect x="0" y="0" width="100" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="23" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="500">⭐ 14 Skills</text>
  </g>
  
  <g transform="translate(470, 470)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="60" y="23" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="500">🚀 安装指南</text>
  </g>
  
  <g transform="translate(610, 470)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="60" y="23" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="500">📚 使用示例</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.7)" letter-spacing="1">OpenClaw · 2026</text>
  
  <!-- Corner decorations -->
  <circle cx="50" cy="580" r="8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="80" cy="580" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="110" cy="580" r="8" fill="rgba(255,255,255,0.1)"/>
  
  <circle cx="1150" cy="50" r="8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1120" cy="50" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1090" cy="50" r="8" fill="rgba(255,255,255,0.1)"/>
</svg>
