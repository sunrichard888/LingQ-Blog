<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#0f3460" opacity="0.2"/>
  
  <!-- Main title -->
  <text x="60" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#e94560" filter="url(#glow)">
    📰 科技日报
  </text>
  
  <!-- Date -->
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" opacity="0.9">
    2026 年 3 月 9 日 · 星期一
  </text>
  
  <!-- Divider line -->
  <line x1="60" y1="270" x2="1140" y2="270" stroke="#e94560" stroke-width="3" opacity="0.5"/>
  
  <!-- Top stories -->
  <text x="60" y="330" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">
    🔥 今日热点
  </text>
  
  <!-- Story 1 -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    ▸ 一加 13 系列正式发布
  </text>
  
  <!-- Story 2 -->
  <text x="60" y="420" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    ▸ 小米汽车交付破 15 万
  </text>
  
  <!-- Story 3 -->
  <text x="60" y="460" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    ▸ 通义千问 Qwen3.5 开源
  </text>
  
  <!-- Story 4 -->
  <text x="60" y="500" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    ▸ 鸿蒙 NEXT 正式版推送
  </text>
  
  <!-- Bottom branding -->
  <text x="1140" y="590" font-family="Arial, sans-serif" font-size="24" fill="#e94560" opacity="0.8" text-anchor="end">
    LingQ Blog · 第 1025 期
  </text>
</svg>
