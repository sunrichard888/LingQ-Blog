<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jade" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C8E6C0"/>
      <stop offset="60%" stop-color="#7CB870"/>
      <stop offset="100%" stop-color="#4A8040"/>
    </radialGradient>
    <radialGradient id="crystal" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#DDEAFF"/>
      <stop offset="60%" stop-color="#70A0E0"/>
      <stop offset="100%" stop-color="#4070B0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Decorative circuit/connection lines -->
  <g opacity="0.15" stroke="#3B82F6" stroke-width="1">
    <line x1="100" y1="200" x2="400" y2="200"/>
    <line x1="800" y1="430" x2="1100" y2="430"/>
    <line x1="400" y1="200" x2="400" y2="350"/>
    <line x1="800" y1="280" x2="800" y2="430"/>
    <circle cx="400" cy="200" r="3" fill="#3B82F6"/>
    <circle cx="800" cy="430" r="3" fill="#3B82F6"/>
  </g>

  <!-- Jade piece (left) -->
  <g transform="translate(250, 300)" filter="url(#shadow)">
    <ellipse cx="0" cy="5" rx="50" ry="42" fill="rgba(0,0,0,0.3)"/>
    <circle cx="0" cy="0" r="50" fill="url(#jade)" stroke="#3D4F5F" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#6B0000" stroke-width="1" opacity="0.4"/>
    <text x="0" y="14" text-anchor="middle" fill="#6B0000" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, serif">馬</text>
  </g>

  <!-- Crystal piece (right) -->
  <g transform="translate(950, 300)" filter="url(#shadow)">
    <circle cx="0" cy="2" r="52" fill="rgba(100,160,255,0.08)"/>
    <circle cx="0" cy="0" r="50" fill="url(#crystal)" stroke="#5A8AB5" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(160,190,255,0.35)" stroke-width="1"/>
    <text x="0" y="14" text-anchor="middle" fill="#FFFFFF" font-size="38" font-weight="bold" font-family="KaiTi, STKaiti, serif">車</text>
  </g>

  <!-- Center: Engine icon -->
  <g transform="translate(600, 280)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="0" text-anchor="middle" fill="#3B82F6" font-size="14" font-family="monospace" opacity="0.8">WASM</text>
    <text x="0" y="20" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="monospace">Fairy-Stockfish</text>
    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="50;70;50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow from engine to pieces -->
  <line x1="540" y1="280" x2="310" y2="290" stroke="#3B82F6" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="660" y1="280" x2="890" y2="290" stroke="#3B82F6" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Title -->
  <text x="600" y="140" text-anchor="middle" fill="#F1F5F9" font-size="40" font-weight="bold" font-family="KaiTi, STKaiti, serif" letter-spacing="3">
    中国象棋 AI 引擎升级
  </text>
  <text x="600" y="180" text-anchor="middle" fill="#64748B" font-size="22" font-family="sans-serif">
    Fairy-Stockfish WASM · 3D 主题 · 动画修复
  </text>

  <!-- Tags -->
  <g font-size="14" font-family="sans-serif">
    <rect x="330" y="460" width="100" height="28" rx="14" fill="#1E40AF" opacity="0.8"/>
    <text x="380" y="479" text-anchor="middle" fill="white">WASM 引擎</text>

    <rect x="450" y="460" width="80" height="28" rx="14" fill="#065F46" opacity="0.8"/>
    <text x="490" y="479" text-anchor="middle" fill="white">5档难度</text>

    <rect x="550" y="460" width="100" height="28" rx="14" fill="#7C2D12" opacity="0.8"/>
    <text x="600" y="479" text-anchor="middle" fill="white">3D 主题 ×3</text>

    <rect x="670" y="460" width="100" height="28" rx="14" fill="#581C87" opacity="0.8"/>
    <text x="720" y="479" text-anchor="middle" fill="white">幽灵Bug修复</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="550" text-anchor="middle" fill="#475569" font-size="16" font-family="sans-serif">
    手写引擎 → 专业级 WASM · 磨砂 → 清晰 3D · 排序序号 → 精确定位
  </text>
  <text x="600" y="580" text-anchor="middle" fill="#334155" font-size="13" font-family="sans-serif">
    LingQ Blog · 2026-03-25
  </text>
</svg>
