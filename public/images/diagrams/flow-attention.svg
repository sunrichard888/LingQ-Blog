<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 280">
  <rect width="750" height="280" fill="#1a202c" rx="8"/>
  
  <text x="375" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold" font-family="system-ui">🧠 Attention 机制流程 (GQA)</text>
  
  <g font-family="system-ui">
    <!-- Input -->
    <rect x="20" y="60" width="100" height="50" fill="#2d3748" stroke="#00d9ff" stroke-width="2" rx="6"/>
    <text x="70" y="80" text-anchor="middle" fill="#fff" font-size="11">输入 X</text>
    <text x="70" y="100" text-anchor="middle" fill="#718096" font-size="9">5×5120</text>
    
    <!-- Arrow -->
    <path d="M120 85 L145 85" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- QKV -->
    <rect x="145" y="60" width="110" height="50" fill="#1a365d" stroke="#4299e1" stroke-width="2" rx="6"/>
    <text x="200" y="80" text-anchor="middle" fill="#fff" font-size="11">QKV 投影</text>
    <text x="200" y="100" text-anchor="middle" fill="#718096" font-size="9">Tensor Core</text>
    
    <!-- Arrow -->
    <path d="M255 85 L280 85" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- QKV Output -->
    <rect x="280" y="50" width="140" height="70" fill="#1a202c" stroke="#4299e1" stroke-width="2" rx="6"/>
    <text x="350" y="70" text-anchor="middle" fill="#4299e1" font-size="10" font-weight="bold">Q / K / V</text>
    <text x="350" y="90" text-anchor="middle" fill="#fff" font-size="9">Q: 5×64×128</text>
    <text x="350" y="105" text-anchor="middle" fill="#fff" font-size="9">K,V: 5×8×128</text>
    
    <!-- Arrow down -->
    <path d="M350 120 L350 145" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Q×K^T -->
    <rect x="280" y="145" width="140" height="50" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="350" y="165" text-anchor="middle" fill="#fff" font-size="11">Q × K^T</text>
    <text x="350" y="185" text-anchor="middle" fill="#718096" font-size="9">注意力分数</text>
    
    <!-- Arrow -->
    <path d="M420 170 L450 170" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Softmax -->
    <rect x="450" y="145" width="100" height="50" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="500" y="165" text-anchor="middle" fill="#fff" font-size="11">Softmax</text>
    <text x="500" y="185" text-anchor="middle" fill="#718096" font-size="9">归一化</text>
    
    <!-- Arrow -->
    <path d="M550 170 L580 170" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Weighted Sum -->
    <rect x="580" y="145" width="120" height="50" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="6"/>
    <text x="640" y="165" text-anchor="middle" fill="#fff" font-size="11">加权求和</text>
    <text x="640" y="185" text-anchor="middle" fill="#718096" font-size="9">Σ(概率 × V)</text>
    
    <!-- KV Cache note -->
    <rect x="20" y="220" width="350" height="45" fill="#1a202c" stroke="#fc8181" stroke-width="1" rx="6"/>
    <text x="195" y="240" text-anchor="middle" fill="#fc8181" font-size="11" font-weight="bold">⚠️ KV Cache 瓶颈</text>
    <text x="195" y="258" text-anchor="middle" fill="#718096" font-size="10">128K 上下文 × 64 层 × 8 头 ≈ 32GB!</text>
  </g>
</svg>
