<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300">
  <rect width="750" height="300" fill="#1a202c" rx="8"/>
  
  <text x="375" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold" font-family="system-ui">🧠 MoE 专家网络流程 (512 选 4)</text>
  
  <g font-family="system-ui">
    <!-- Input -->
    <rect x="20" y="60" width="100" height="50" fill="#2d3748" stroke="#00d9ff" stroke-width="2" rx="6"/>
    <text x="70" y="80" text-anchor="middle" fill="#fff" font-size="11">输入向量</text>
    <text x="70" y="100" text-anchor="middle" fill="#718096" font-size="9">5120 维</text>
    
    <!-- Arrow -->
    <path d="M120 85 L150 85" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Router -->
    <rect x="150" y="60" width="120" height="50" fill="#1a202c" stroke="#ff6b6b" stroke-width="2" rx="6"/>
    <text x="210" y="80" text-anchor="middle" fill="#fff" font-size="11">路由网络</text>
    <text x="210" y="100" text-anchor="middle" fill="#718096" font-size="9">计算 512 个分数</text>
    
    <!-- Arrow -->
    <path d="M270 85 L300 85" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Select -->
    <rect x="300" y="60" width="120" height="50" fill="#1a365d" stroke="#ff6b6b" stroke-width="2" rx="6"/>
    <text x="360" y="80" text-anchor="middle" fill="#fff" font-size="11">选前 4 专家</text>
    <text x="360" y="100" text-anchor="middle" fill="#718096" font-size="9">权重：0.4/0.3/0.2/0.1</text>
    
    <!-- Experts -->
    <g transform="translate(440, 50)">
      <rect x="0" y="0" width="70" height="45" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="4"/>
      <text x="35" y="25" text-anchor="middle" fill="#fff" font-size="10">专家 1</text>
      
      <rect x="80" y="0" width="70" height="45" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="4"/>
      <text x="115" y="25" text-anchor="middle" fill="#fff" font-size="10">专家 2</text>
      
      <rect x="160" y="0" width="70" height="45" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="4"/>
      <text x="195" y="25" text-anchor="middle" fill="#fff" font-size="10">专家 3</text>
      
      <rect x="240" y="0" width="70" height="45" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="4"/>
      <text x="275" y="25" text-anchor="middle" fill="#fff" font-size="10">专家 4</text>
    </g>
    
    <!-- Arrow down -->
    <path d="M550 95 L550 120" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Merge -->
    <rect x="480" y="120" width="140" height="50" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="550" y="140" text-anchor="middle" fill="#fff" font-size="11">加权合并</text>
    <text x="550" y="160" text-anchor="middle" fill="#718096" font-size="9">0.4×E1+0.3×E2+...</text>
    
    <!-- Arrow -->
    <path d="M620 145 L650 145" stroke="#00d9ff" stroke-width="2"/>
    
    <!-- Output -->
    <rect x="650" y="120" width="80" height="50" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="6"/>
    <text x="690" y="145" text-anchor="middle" fill="#fff" font-size="11">输出</text>
  </g>
  
  <!-- Stats -->
  <rect x="20" y="220" width="340" height="65" fill="#1a202c" stroke="#4a5568" stroke-width="1" rx="6"/>
  <text x="190" y="242" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">📊 MoE 参数分布</text>
  <text x="40" y="262" text-anchor="left" fill="#ff6b6b" font-size="10">专家总数：512 个</text>
  <text x="40" y="278" text-anchor="left" fill="#48bb78" font-size="10">每次激活：4 个 (0.8%)</text>
  
  <rect x="380" y="220" width="350" height="65" fill="#1a202c" stroke="#4a5568" stroke-width="1" rx="6"/>
  <text x="555" y="242" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">⚡ 优势 vs 挑战</text>
  <text x="400" y="262" text-anchor="left" fill="#48bb78" font-size="10">✅ 推理快 (17B 激活)</text>
  <text x="580" y="262" text-anchor="left" fill="#fc8181" font-size="10">❌ 显存大 (397B 权重)</text>
</svg>
