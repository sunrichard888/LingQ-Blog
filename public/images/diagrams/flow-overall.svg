<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d9ff"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="400" fill="#1a202c" rx="8"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold" font-family="system-ui">🔄 大模型推理整体流程</text>
  
  <!-- Boxes -->
  <g font-family="system-ui" font-size="12">
    <!-- Input -->
    <rect x="20" y="70" width="100" height="60" fill="#2d3748" stroke="#00d9ff" stroke-width="2" rx="6"/>
    <text x="70" y="95" text-anchor="middle" fill="#fff">用户输入</text>
    <text x="70" y="115" text-anchor="middle" fill="#718096" font-size="10">"什么是 MoE？"</text>
    
    <!-- Tokenize -->
    <rect x="160" y="70" width="100" height="60" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="210" y="95" text-anchor="middle" fill="#fff">Tokenize</text>
    <text x="210" y="115" text-anchor="middle" fill="#718096" font-size="10">文字→ID</text>
    
    <!-- Embedding -->
    <rect x="300" y="70" width="100" height="60" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="350" y="95" text-anchor="middle" fill="#fff">Embedding</text>
    <text x="350" y="115" text-anchor="middle" fill="#718096" font-size="10">ID→向量</text>
    
    <!-- Transformer -->
    <rect x="440" y="50" width="180" height="100" fill="#1a365d" stroke="#00d9ff" stroke-width="3" rx="8"/>
    <text x="530" y="75" text-anchor="middle" fill="#00d9ff" font-size="14" font-weight="bold">Transformer ×64</text>
    <rect x="460" y="85" width="70" height="50" fill="#2d3748" stroke="#4299e1" stroke-width="2" rx="4"/>
    <text x="495" y="105" text-anchor="middle" fill="#fff" font-size="10">Attention</text>
    <text x="495" y="120" text-anchor="middle" fill="#718096" font-size="9">GQA/MLA</text>
    <rect x="540" y="85" width="70" height="50" fill="#2d3748" stroke="#ff6b6b" stroke-width="2" rx="4"/>
    <text x="575" y="105" text-anchor="middle" fill="#fff" font-size="10">MoE 专家</text>
    <text x="575" y="120" text-anchor="middle" fill="#718096" font-size="9">512 选 4</text>
    
    <!-- Output Head -->
    <rect x="660" y="70" width="100" height="60" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="710" y="95" text-anchor="middle" fill="#fff">Output Head</text>
    <text x="710" y="115" text-anchor="middle" fill="#718096" font-size="10">向量→概率</text>
    
    <!-- Sample -->
    <rect x="20" y="200" width="100" height="60" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="70" y="225" text-anchor="middle" fill="#fff">采样</text>
    <text x="70" y="245" text-anchor="middle" fill="#718096" font-size="10">Top-P/Top-K</text>
    
    <!-- Decode -->
    <rect x="160" y="200" width="100" height="60" fill="#1a202c" stroke="#a0aec0" stroke-width="1" rx="6"/>
    <text x="210" y="225" text-anchor="middle" fill="#fff">解码</text>
    <text x="210" y="245" text-anchor="middle" fill="#718096" font-size="10">ID→文字</text>
    
    <!-- Output -->
    <rect x="300" y="200" width="120" height="60" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="6"/>
    <text x="360" y="225" text-anchor="middle" fill="#fff">文字输出</text>
    <text x="360" y="245" text-anchor="middle" fill="#718096" font-size="10">"MoE 是一种..."</text>
    
    <!-- Loop arrow -->
    <path d="M360 260 L360 300 L70 300 L70 130" fill="none" stroke="#f6ad55" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <text x="200" y="320" text-anchor="middle" fill="#f6ad55" font-size="11">↺ 自回归循环</text>
  </g>
  
  <!-- Arrows -->
  <g stroke="#00d9ff" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M120 100 L160 100"/>
    <path d="M260 100 L300 100"/>
    <path d="M400 100 L440 100"/>
    <path d="M620 100 L660 100"/>
    <path d="M710 130 L710 160 L70 160 L70 200"/>
    <path d="M120 230 L160 230"/>
    <path d="M260 230 L300 230"/>
  </g>
</svg>
