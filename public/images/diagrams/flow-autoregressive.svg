<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200">
  <rect width="750" height="200" fill="#1a202c" rx="8"/>
  
  <text x="375" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold" font-family="system-ui">🔄 自回归生成循环</text>
  
  <g font-family="system-ui">
    <!-- Round 1 -->
    <rect x="20" y="60" width="130" height="70" fill="#2d3748" stroke="#00d9ff" stroke-width="2" rx="6"/>
    <text x="85" y="80" text-anchor="middle" fill="#fff" font-size="10">第 1 轮</text>
    <text x="85" y="100" text-anchor="middle" fill="#718096" font-size="9">输入："什么是 MoE？"</text>
    <text x="85" y="120" text-anchor="middle" fill="#48bb78" font-size="10">输出："Mo"</text>
    
    <!-- Arrow -->
    <path d="M150 95 L175 95" stroke="#00d9ff" stroke-width="2" marker-end="url(#arrow4)"/>
    
    <!-- Round 2 -->
    <rect x="175" y="60" width="130" height="70" fill="#2d3748" stroke="#00d9ff" stroke-width="2" rx="6"/>
    <text x="240" y="80" text-anchor="middle" fill="#fff" font-size="10">第 2 轮</text>
    <text x="240" y="100" text-anchor="middle" fill="#718096" font-size="9">输入："...Mo"</text>
    <text x="240" y="120" text-anchor="middle" fill="#48bb78" font-size="10">输出："E"</text>
    
    <!-- Arrow -->
    <path d="M305 95 L330 95" stroke="#00d9ff" stroke-width="2" marker-end="url(#arrow4)"/>
    
    <!-- Round 3 -->
    <rect x="330" y="60" width="130" height="70" fill="#2d3748" stroke="#00d9ff" stroke-width="2" rx="6"/>
    <text x="395" y="80" text-anchor="middle" fill="#fff" font-size="10">第 3 轮</text>
    <text x="395" y="100" text-anchor="middle" fill="#718096" font-size="9">输入："...MoE"</text>
    <text x="395" y="120" text-anchor="middle" fill="#48bb78" font-size="10">输出："是"</text>
    
    <!-- Arrow -->
    <path d="M460 95 L485 95" stroke="#00d9ff" stroke-width="2" marker-end="url(#arrow4)"/>
    
    <!-- Dots -->
    <rect x="485" y="60" width="80" height="70" fill="#1a202c" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4,4" rx="6"/>
    <text x="525" y="95" text-anchor="middle" fill="#a0aec0" font-size="16">...</text>
    
    <!-- Arrow -->
    <path d="M565 95 L590 95" stroke="#00d9ff" stroke-width="2" marker-end="url(#arrow4)"/>
    
    <!-- Final -->
    <rect x="590" y="60" width="140" height="70" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="6"/>
    <text x="660" y="80" text-anchor="middle" fill="#fff" font-size="10">第 N 轮</text>
    <text x="660" y="100" text-anchor="middle" fill="#718096" font-size="9">输出："。"</text>
    <text x="660" y="120" text-anchor="middle" fill="#fc8181" font-size="10">EOS 结束</text>
  </g>
  
  <!-- KV Cache note -->
  <rect x="20" y="155" width="350" height="30" fill="#1a202c" stroke="#f6ad55" stroke-width="1" rx="6"/>
  <text x="195" y="175" text-anchor="middle" fill="#f6ad55" font-size="11" font-family="system-ui">💡 KV Cache 复用：之前的 K/V 不重算</text>
  
  <!-- Speed note -->
  <rect x="390" y="155" width="340" height="30" fill="#1a202c" stroke="#4a5568" stroke-width="1" rx="6"/>
  <text x="560" y="175" text-anchor="middle" fill="#718096" font-size="11" font-family="system-ui">⚡ 生成速度：20-100 tokens/秒</text>
  
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d9ff"/>
    </marker>
  </defs>
</svg>
