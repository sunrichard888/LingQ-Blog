<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative radar circles -->
  <circle cx="950" cy="315" r="200" fill="none" stroke="rgba(231,76,60,0.08)" stroke-width="1"/>
  <circle cx="950" cy="315" r="150" fill="none" stroke="rgba(231,76,60,0.12)" stroke-width="1"/>
  <circle cx="950" cy="315" r="100" fill="none" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>
  <circle cx="950" cy="315" r="50" fill="none" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>

  <!-- Radar crosshair -->
  <line x1="750" y1="315" x2="1150" y2="315" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>
  <line x1="950" y1="115" x2="950" y2="515" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>

  <!-- Shield icon -->
  <g transform="translate(910, 275)" filter="url(#glow)">
    <path d="M40 0 L80 20 L80 60 L40 90 L0 60 L0 20 Z" fill="none" stroke="rgba(231,76,60,0.4)" stroke-width="2"/>
    <path d="M40 15 L65 28 L65 52 L40 72 L15 52 L15 28 Z" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.6)" stroke-width="1.5"/>
    <text x="40" y="52" text-anchor="middle" fill="rgba(231,76,60,0.8)" font-size="24" font-weight="bold">★</text>
  </g>

  <!-- Star decorations -->
  <g transform="translate(150, 100)">
    <polygon points="15,0 19,11 30,11 21,18 24,30 15,23 6,30 9,18 0,11 11,11" fill="rgba(231,76,60,0.3)" transform="scale(0.8)"/>
  </g>
  <g transform="translate(1050, 80)">
    <polygon points="15,0 19,11 30,11 21,18 24,30 15,23 6,30 9,18 0,11 11,11" fill="rgba(231,76,60,0.2)" transform="scale(0.6)"/>
  </g>

  <!-- Red accent line -->
  <rect x="80" y="180" width="80" height="4" fill="url(#accent)" rx="2"/>

  <!-- Title -->
  <text x="80" y="230" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800">每日军事新闻精选</text>

  <!-- English subtitle -->
  <text x="80" y="270" fill="rgba(231,76,60,0.7)" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" letter-spacing="4">DAILY MILITARY NEWS</text>

  <!-- Date -->
  <text x="80" y="340" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, sans-serif" font-size="22">2026 年 5 月 3 日 · 星期日</text>

  <!-- Key topics -->
  <g transform="translate(80, 390)">
    <!-- Topic badges -->
    <rect x="0" y="0" width="160" height="36" rx="18" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.3)" stroke-width="1"/>
    <text x="80" y="23" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="14">🇺🇸 美国国防预算</text>

    <rect x="180" y="0" width="160" height="36" rx="18" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.3)" stroke-width="1"/>
    <text x="260" y="23" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="14">🇷🇺 胜利日阅兵</text>

    <rect x="360" y="0" width="160" height="36" rx="18" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.3)" stroke-width="1"/>
    <text x="440" y="23" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="14">🤖 军事AI</text>

    <rect x="540" y="0" width="180" height="36" rx="18" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.3)" stroke-width="1"/>
    <text x="630" y="23" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="14">✈️ F/A-XX 六代机</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(231,76,60,0.1)"/>
  <text x="600" y="616" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="14">🦐 虾秘 · LingQ-Blog 每日精选 · 20 条全球军事要闻</text>
</svg>
