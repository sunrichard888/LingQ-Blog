<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ubuntuOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C74012;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="openclawRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Ubuntu 风格装饰圆环 -->
  <g transform="translate(100, 100)" opacity="0.1">
    <circle cx="400" cy="200" r="150" fill="none" stroke="#E95420" stroke-width="2"/>
    <circle cx="450" cy="200" r="100" fill="none" stroke="#E95420" stroke-width="2"/>
    <circle cx="480" cy="200" r="60" fill="none" stroke="#E95420" stroke-width="2"/>
  </g>
  
  <!-- 左侧：Ubuntu Logo 风格 -->
  <g transform="translate(80, 120)">
    <!-- Ubuntu 三个圆点 -->
    <circle cx="60" cy="60" r="25" fill="url(#ubuntuOrange)" opacity="0.9"/>
    <circle cx="140" cy="60" r="25" fill="url(#ubuntuOrange)" opacity="0.9"/>
    <circle cx="100" cy="130" r="25" fill="url(#ubuntuOrange)" opacity="0.9"/>
    
    <!-- 连接线 -->
    <line x1="75" y1="75" x2="125" y2="75" stroke="#E95420" stroke-width="3" opacity="0.5"/>
    <line x1="85" y1="95" x2="115" y2="115" stroke="#E95420" stroke-width="3" opacity="0.5"/>
    <line x1="115" y1="95" x2="85" y2="115" stroke="#E95420" stroke-width="3" opacity="0.5"/>
  </g>
  
  <!-- 主标题 -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">
    Ubuntu 部署
  </text>
  
  <!-- OpenClaw 标题 -->
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="url(#openclawRed)" filter="url(#glow)">
    OpenClaw
  </text>
  
  <!-- 副标题 -->
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a0a0a0">
    从零到多通道 AI 网关完整指南
  </text>
  
  <!-- 右侧：服务器/终端插图 -->
  <g transform="translate(650, 150)">
    <!-- 服务器机箱 -->
    <rect x="0" y="0" width="480" height="280" rx="15" fill="rgba(233,69,96,0.1)" stroke="url(#openclawRed)" stroke-width="3"/>
    
    <!-- 终端窗口 -->
    <rect x="20" y="20" width="440" height="240" rx="8" fill="rgba(0,0,0,0.5)"/>
    <rect x="20" y="20" width="440" height="35" rx="8" fill="rgba(233,69,96,0.2)"/>
    
    <!-- 终端按钮 -->
    <circle cx="45" cy="37" r="5" fill="#ff5f56"/>
    <circle cx="65" cy="37" r="5" fill="#ffbd2e"/>
    <circle cx="85" cy="37" r="5" fill="#27c93f"/>
    
    <!-- 终端文字 -->
    <text x="40" y="75" font-family="monospace" font-size="16" fill="#27c93f">$ curl -fsSL https://openclaw.ai/install.sh | bash</text>
    <text x="40" y="105" font-family="monospace" font-size="16" fill="#ffffff">✓ Node.js 22 installed</text>
    <text x="40" y="130" font-family="monospace" font-size="16" fill="#ffffff">✓ OpenClaw CLI installed</text>
    <text x="40" y="155" font-family="monospace" font-size="16" fill="#ffffff">✓ Gateway service started</text>
    <text x="40" y="180" font-family="monospace" font-size="16" fill="#ffffff">✓ Control UI: http://localhost:18789</text>
    
    <!-- 状态指示灯 -->
    <circle cx="460" cy="260" r="8" fill="#27c93f" filter="url(#glow)"/>
    <text x="380" y="265" font-family="system-ui" font-size="14" fill="#27c93f">Gateway Running</text>
  </g>
  
  <!-- 底部特性列表 -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="520" height="120" rx="10" fill="rgba(255,255,255,0.05)"/>
    
    <text x="20" y="35" font-family="system-ui" font-size="20" fill="#ffffff">
      ✅ 一键安装脚本
    </text>
    <text x="20" y="65" font-family="system-ui" font-size="20" fill="#ffffff">
      ✅ WhatsApp/Telegram 通道绑定
    </text>
    <text x="20" y="95" font-family="system-ui" font-size="20" fill="#ffffff">
      ✅ 远程访问 + 安全加固
    </text>
  </g>
  
  <!-- 底部装饰线 -->
  <line x1="80" y1="580" x2="1120" y2="580" stroke="url(#ubuntuOrange)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 底部文字 -->
  <text x="80" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#666666">
    编辑：乔叔 · LingQ Blog
  </text>
  
  <text x="1120" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#666666" text-anchor="end">
    2026-03-11
  </text>
</svg>
