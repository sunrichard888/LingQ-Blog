<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Circuit board pattern -->
  <g stroke="rgba(0,210,255,0.08)" stroke-width="1" fill="none">
    <line x1="100" y1="50" x2="100" y2="580"/>
    <line x1="200" y1="100" x2="200" y2="530"/>
    <line x1="300" y1="30" x2="300" y2="600"/>
    <line x1="400" y1="80" x2="400" y2="550"/>
    <line x1="800" y1="50" x2="800" y2="580"/>
    <line x1="900" y1="100" x2="900" y2="530"/>
    <line x1="1000" y1="30" x2="1000" y2="600"/>
    <line x1="1100" y1="80" x2="1100" y2="550"/>
    <line x1="50" y1="200" x2="1150" y2="200"/>
    <line x1="50" y1="300" x2="1150" y2="300"/>
    <line x1="50" y1="400" x2="1150" y2="400"/>
    <line x1="50" y1="500" x2="1150" y2="500"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="rgba(0,210,255,0.15)">
    <circle cx="100" cy="200" r="4"/>
    <circle cx="300" cy="300" r="4"/>
    <circle cx="400" cy="400" r="4"/>
    <circle cx="800" cy="200" r="4"/>
    <circle cx="1000" cy="400" r="4"/>
    <circle cx="1100" cy="300" r="4"/>
    <circle cx="200" cy="400" r="3"/>
    <circle cx="900" cy="300" r="3"/>
  </g>

  <!-- Chip icon -->
  <g transform="translate(960, 60)" filter="url(#glow)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <rect x="20" y="20" width="40" height="40" rx="4" fill="url(#accent)" opacity="0.3"/>
    <!-- Pins -->
    <line x1="15" y1="10" x2="15" y2="0" stroke="#00d2ff" stroke-width="2"/>
    <line x1="30" y1="10" x2="30" y2="0" stroke="#00d2ff" stroke-width="2"/>
    <line x1="50" y1="10" x2="50" y2="0" stroke="#00d2ff" stroke-width="2"/>
    <line x1="65" y1="10" x2="65" y2="0" stroke="#00d2ff" stroke-width="2"/>
    <line x1="15" y1="70" x2="15" y2="80" stroke="#00d2ff" stroke-width="2"/>
    <line x1="30" y1="70" x2="30" y2="80" stroke="#00d2ff" stroke-width="2"/>
    <line x1="50" y1="70" x2="50" y2="80" stroke="#00d2ff" stroke-width="2"/>
    <line x1="65" y1="70" x2="65" y2="80" stroke="#00d2ff" stroke-width="2"/>
    <line x1="10" y1="15" x2="0" y2="15" stroke="#00d2ff" stroke-width="2"/>
    <line x1="10" y1="30" x2="0" y2="30" stroke="#00d2ff" stroke-width="2"/>
    <line x1="10" y1="50" x2="0" y2="50" stroke="#00d2ff" stroke-width="2"/>
    <line x1="10" y1="65" x2="0" y2="65" stroke="#00d2ff" stroke-width="2"/>
    <line x1="70" y1="15" x2="80" y2="15" stroke="#00d2ff" stroke-width="2"/>
    <line x1="70" y1="30" x2="80" y2="30" stroke="#00d2ff" stroke-width="2"/>
    <line x1="70" y1="50" x2="80" y2="50" stroke="#00d2ff" stroke-width="2"/>
    <line x1="70" y1="65" x2="80" y2="65" stroke="#00d2ff" stroke-width="2"/>
  </g>

  <!-- AI Neural network dots -->
  <g stroke="rgba(58,123,213,0.2)" stroke-width="1">
    <line x1="120" y1="120" x2="180" y2="80"/>
    <line x1="180" y1="80" x2="250" y2="110"/>
    <line x1="120" y1="120" x2="160" y2="170"/>
    <line x1="180" y1="80" x2="220" y2="150"/>
    <line x1="250" y1="110" x2="220" y2="150"/>
    <line x1="160" y1="170" x2="220" y2="150"/>
  </g>
  <g fill="rgba(0,210,255,0.4)">
    <circle cx="120" cy="120" r="5"/>
    <circle cx="180" cy="80" r="5"/>
    <circle cx="250" cy="110" r="5"/>
    <circle cx="160" cy="170" r="5"/>
    <circle cx="220" cy="150" r="5"/>
  </g>

  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff">
    每日科技新闻
  </text>

  <!-- Accent line -->
  <rect x="450" y="305" width="300" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#8892b0">
    Daily Tech News
  </text>

  <!-- Date -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="300" fill="#00d2ff">
    2026-04-30
  </text>

  <!-- Keywords -->
  <g transform="translate(340, 470)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="rgba(0,210,255,0.1)" stroke="rgba(0,210,255,0.3)" stroke-width="1"/>
    <text x="65" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00d2ff">AI 芯片</text>

    <rect x="150" y="0" width="130" height="32" rx="16" fill="rgba(0,210,255,0.1)" stroke="rgba(0,210,255,0.3)" stroke-width="1"/>
    <text x="215" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00d2ff">半导体</text>

    <rect x="300" y="0" width="130" height="32" rx="16" fill="rgba(0,210,255,0.1)" stroke="rgba(0,210,255,0.3)" stroke-width="1"/>
    <text x="365" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#00d2ff">先进封装</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="616" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#6b7280">
    虾博 XiaBo · 自动采集整理 · 数据来源: Tavily AI Search
  </text>
</svg>
