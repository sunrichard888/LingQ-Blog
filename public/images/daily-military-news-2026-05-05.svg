<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative radar circles -->
  <circle cx="950" cy="180" r="200" fill="none" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>
  <circle cx="950" cy="180" r="150" fill="none" stroke="rgba(231,76,60,0.08)" stroke-width="1"/>
  <circle cx="950" cy="180" r="100" fill="none" stroke="rgba(231,76,60,0.06)" stroke-width="1"/>
  <circle cx="950" cy="180" r="50" fill="none" stroke="rgba(231,76,60,0.04)" stroke-width="1"/>
  <line x1="950" y1="180" x2="1100" y2="80" stroke="rgba(231,76,60,0.3)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="950" cy="180" r="5" fill="#e74c3c" filter="url(#glow)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  
  <!-- Shield icon -->
  <g transform="translate(60, 80)" filter="url(#glow)">
    <path d="M30 0 L60 15 L60 45 Q60 65 30 75 Q0 65 0 45 L0 15 Z" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <path d="M30 12 L48 22 L48 42 Q48 56 30 63 Q12 56 12 42 L12 22 Z" fill="rgba(231,76,60,0.15)"/>
    <text x="30" y="46" text-anchor="middle" fill="#e74c3c" font-size="22" font-weight="bold">⚔</text>
  </g>
  
  <!-- Title -->
  <text x="160" y="120" fill="#ffffff" font-family="system-ui, sans-serif" font-size="42" font-weight="800">每日军事新闻精选</text>
  <text x="160" y="165" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="20">DAILY MILITARY NEWS DIGEST</text>
  
  <!-- Date -->
  <text x="160" y="220" fill="#f39c12" font-family="system-ui, sans-serif" font-size="28" font-weight="600">2026.05.05  星期一</text>
  
  <!-- Divider -->
  <line x1="160" y1="245" x2="500" y2="245" stroke="url(#accent)" stroke-width="2"/>
  
  <!-- Key topics -->
  <text x="160" y="295" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="22" font-weight="600">今日焦点</text>
  
  <text x="160" y="335" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="16">
    <tspan fill="#e74c3c" font-weight="600">▎</tspan> 伊朗战争60天耗资250亿美元，五角大楼首次公布账单
  </text>
  <text x="160" y="365" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="16">
    <tspan fill="#e74c3c" font-weight="600">▎</tspan> FY2026国防预算9616亿美元创纪录，参议院加码1.2万亿
  </text>
  <text x="160" y="395" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="16">
    <tspan fill="#e74c3c" font-weight="600">▎</tspan> 俄军在乌首次净领土流失，胜利日阅兵取消重装备
  </text>
  <text x="160" y="425" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="16">
    <tspan fill="#e74c3c" font-weight="600">▎</tspan> 以色列部署AI拦截无人机对抗真主党光纤制导无人机
  </text>
  <text x="160" y="455" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="16">
    <tspan fill="#e74c3c" font-weight="600">▎</tspan> 乌克兰押注战场AI，武器自主化竞赛加速
  </text>
  
  <!-- Tags -->
  <g transform="translate(160, 490)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="rgba(231,76,60,0.2)" stroke="rgba(231,76,60,0.4)" stroke-width="1"/>
    <text x="60" y="19" text-anchor="middle" fill="#e74c3c" font-family="system-ui" font-size="12">#伊朗战争</text>
    <rect x="130" y="0" width="140" height="28" rx="14" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.4)" stroke-width="1"/>
    <text x="200" y="19" text-anchor="middle" fill="#f39c12" font-family="system-ui" font-size="12">#国防预算</text>
    <rect x="280" y="0" width="120" height="28" rx="14" fill="rgba(52,152,219,0.2)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
    <text x="340" y="19" text-anchor="middle" fill="#3498db" font-family="system-ui" font-size="12">#俄乌战局</text>
    <rect x="410" y="0" width="140" height="28" rx="14" fill="rgba(46,204,113,0.2)" stroke="rgba(46,204,113,0.4)" stroke-width="1"/>
    <text x="480" y="19" text-anchor="middle" fill="#2ecc71" font-family="system-ui" font-size="12">#AI军事化</text>
    <rect x="560" y="0" width="140" height="28" rx="14" fill="rgba(155,89,182,0.2)" stroke="rgba(155,89,182,0.4)" stroke-width="1"/>
    <text x="630" y="19" text-anchor="middle" fill="#9b59b6" font-family="system-ui" font-size="12">#无人机攻防</text>
  </g>
  
  <!-- Right side decorative elements -->
  <text x="1130" y="590" fill="rgba(255,255,255,0.15)" font-family="system-ui" font-size="14" text-anchor="end">LingQ-Blog | 军事新闻</text>
  
  <!-- Bottom line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>