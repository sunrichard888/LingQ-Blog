<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#aiGrad)"/>
  
  <!-- AI 神经网络装饰 -->
  <g opacity="0.15" stroke="#fff" stroke-width="1.5" fill="none">
    <circle cx="150" cy="150" r="30"/>
    <circle cx="300" cy="100" r="25"/>
    <circle cx="450" cy="180" r="35"/>
    <circle cx="200" cy="300" r="28"/>
    <circle cx="400" cy="350" r="32"/>
    <line x1="150" y1="150" x2="300" y2="100"/>
    <line x1="300" y1="100" x2="450" y2="180"/>
    <line x1="150" y1="150" x2="200" y2="300"/>
    <line x1="300" y1="100" x2="400" y2="350"/>
    <line x1="450" y1="180" x2="400" y2="350"/>
    <line x1="200" y1="300" x2="400" y2="350"/>
  </g>
  
  <!-- AI 大脑图标 -->
  <g transform="translate(950, 120)">
    <ellipse cx="100" cy="100" rx="80" ry="90" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="3"/>
    <path d="M60 80 Q80 60 100 80 Q120 60 140 80 Q150 100 140 120 Q120 140 100 120 Q80 140 60 120 Q50 100 60 80" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="2"/>
    <circle cx="85" cy="95" r="8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="115" cy="95" r="8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="100" cy="115" r="6" fill="rgba(255,255,255,0.4)"/>
  </g>
  
  <!-- 装饰光点 -->
  <circle cx="100" cy="550" r="50" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="580" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1050" cy="50" r="40" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 标题文字 -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" opacity="0.95">🤖 AI Agent</text>
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.9">深度分析</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ffffff" opacity="0.85">2026 年自主智能体技术全景</text>
  
  <!-- 关键要点 -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" opacity="0.8">• 技术架构解析</text>
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" opacity="0.8">• 应用场景探索</text>
  <text x="80" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" opacity="0.8">• 市场格局展望</text>
  
  <!-- 底部装饰 -->
  <rect x="80" y="540" width="400" height="4" fill="rgba(255,255,255,0.5)" rx="2"/>
</svg>
