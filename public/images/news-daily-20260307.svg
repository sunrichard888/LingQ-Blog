<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid lines -->
  <g stroke="#0f3460" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  
  <!-- Newspaper icon (simplified) -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="120" height="160" fill="#ffffff" opacity="0.1" rx="5"/>
    <rect x="10" y="15" width="100" height="8" fill="#e94560" rx="2"/>
    <rect x="10" y="30" width="80" height="4" fill="#ffffff" opacity="0.6" rx="1"/>
    <rect x="10" y="40" width="90" height="4" fill="#ffffff" opacity="0.6" rx="1"/>
    <rect x="10" y="50" width="85" height="4" fill="#ffffff" opacity="0.6" rx="1"/>
    <rect x="10" y="70" width="100" height="60" fill="#ffffff" opacity="0.05" rx="2"/>
    <rect x="15" y="75" width="40" height="4" fill="#e94560" opacity="0.8" rx="1"/>
    <rect x="15" y="85" width="90" height="3" fill="#ffffff" opacity="0.4" rx="1"/>
    <rect x="15" y="92" width="90" height="3" fill="#ffffff" opacity="0.4" rx="1"/>
    <rect x="15" y="99" width="90" height="3" fill="#ffffff" opacity="0.4" rx="1"/>
    <rect x="15" y="106" width="90" height="3" fill="#ffffff" opacity="0.4" rx="1"/>
    <rect x="15" y="113" width="90" height="3" fill="#ffffff" opacity="0.4" rx="1"/>
  </g>
  
  <!-- AI/Tech icon (circuit pattern) -->
  <g transform="translate(1050, 50)" opacity="0.4">
    <circle cx="50" cy="50" r="40" stroke="#00d9ff" stroke-width="2" fill="none"/>
    <circle cx="50" cy="50" r="25" stroke="#00d9ff" stroke-width="2" fill="none"/>
    <circle cx="50" cy="50" r="10" fill="#00d9ff"/>
    <line x1="50" y1="10" x2="50" y2="0" stroke="#00d9ff" stroke-width="2"/>
    <line x1="50" y1="90" x2="50" y2="100" stroke="#00d9ff" stroke-width="2"/>
    <line x1="10" y1="50" x2="0" y2="50" stroke="#00d9ff" stroke-width="2"/>
    <line x1="90" y1="50" x2="100" y2="50" stroke="#00d9ff" stroke-width="2"/>
    <circle cx="50" cy="0" r="3" fill="#00d9ff"/>
    <circle cx="50" cy="100" r="3" fill="#00d9ff"/>
    <circle cx="0" cy="50" r="3" fill="#00d9ff"/>
    <circle cx="100" cy="50" r="3" fill="#00d9ff"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    📰 热点新闻 TOP10
  </text>
  
  <!-- Date badge -->
  <g transform="translate(600, 240)">
    <rect x="-120" y="-30" width="240" height="60" fill="url(#accentGradient)" rx="30" filter="url(#glow)"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
      2026 年 3 月 7 日
    </text>
  </g>
  
  <!-- Topic tags -->
  <g transform="translate(600, 320)">
    <g transform="translate(-180, 0)">
      <rect x="-60" y="-20" width="120" height="40" fill="#0f3460" rx="20" stroke="#e94560" stroke-width="2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="18" fill="#e94560" text-anchor="middle" font-weight="bold">AI 科技</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-60" y="-20" width="120" height="40" fill="#0f3460" rx="20" stroke="#00d9ff" stroke-width="2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="18" fill="#00d9ff" text-anchor="middle" font-weight="bold">财经商业</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="-60" y="-20" width="120" height="40" fill="#0f3460" rx="20" stroke="#ffd93d" stroke-width="2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="18" fill="#ffd93d" text-anchor="middle" font-weight="bold">国际时事</text>
    </g>
  </g>
  
  <!-- Highlighted topics -->
  <g transform="translate(600, 420)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.8">
      何小鹏 AI 论 · 谷歌 CEO 天价薪酬 · 中东油价飙升
    </text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.8">
      阿里 Qwen 人事震荡 · 高校毕业生 1270 万
    </text>
  </g>
  
  <!-- Bottom decoration -->
  <g transform="translate(600, 550)">
    <rect x="-200" y="-15" width="400" height="30" fill="#0f3460" rx="15" opacity="0.5"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" letter-spacing="2">
      科技老司机 · 每日热点精选
    </text>
  </g>
  
  <!-- Corner accents -->
  <g fill="#e94560" opacity="0.6">
    <polygon points="0,0 80,0 0,80"/>
    <polygon points="1200,0 1120,0 1200,80"/>
    <polygon points="0,630 80,630 0,550"/>
    <polygon points="1200,630 1120,630 1200,550"/>
  </g>
  
  <!-- Animated-style lines (static for SVG) -->
  <g stroke="#e94560" stroke-width="2" opacity="0.4">
    <line x1="200" y1="300" x2="250" y2="300"/>
    <line x1="200" y1="320" x2="240" y2="320"/>
    <line x1="200" y1="340" x2="260" y2="340"/>
    <line x1="950" y1="300" x2="1000" y2="300"/>
    <line x1="950" y1="320" x2="990" y2="320"/>
    <line x1="950" y1="340" x2="1010" y2="340"/>
  </g>
</svg>
