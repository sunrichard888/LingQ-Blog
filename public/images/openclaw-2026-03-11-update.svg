<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 装饰性网格 -->
  <g opacity="0.1">
    <path d="M0 100 L1200 100" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 200 L1200 200" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 300 L1200 300" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 400 L1200 400" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 500 L1200 500" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 600 L1200 600" stroke="#ffffff" stroke-width="1"/>
    <path d="M100 0 L100 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M200 0 L200 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M300 0 L300 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M400 0 L400 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M500 0 L500 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M600 0 L600 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M700 0 L700 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M800 0 L800 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M900 0 L900 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M1000 0 L1000 630" stroke="#ffffff" stroke-width="1"/>
    <path d="M1100 0 L1100 630" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- OpenClaw Logo 图标（简化版龙虾钳） -->
  <g transform="translate(80, 80)">
    <path d="M40 20 Q60 0 80 20 L75 25 Q60 10 45 25 Z" fill="url(#accentGradient)"/>
    <path d="M40 30 Q20 50 40 70 L45 65 Q30 50 45 35 Z" fill="url(#accentGradient)"/>
    <circle cx="50" cy="40" r="15" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
  </g>
  
  <!-- 主标题 -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">
    OpenClaw
  </text>
  
  <!-- 版本号 -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#e94560">
    2026.3.9 更新
  </text>
  
  <!-- 副标题 -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a0a0a0">
    备份功能上线 · Talk 模式更智能
  </text>
  
  <!-- 特性列表背景 -->
  <rect x="80" y="360" width="500" height="200" rx="10" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 特性列表 -->
  <g transform="translate(100, 400)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff">
      📦 CLI 备份功能
    </text>
    <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff">
      🎤 Talk 模式静默超时
    </text>
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff">
      🔗 ACP 溯源元数据
    </text>
    <text x="0" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff">
      🖥️ TUI 自动推断 Agent
    </text>
    <text x="0" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff">
      🍎 macOS 应用优化
    </text>
  </g>
  
  <!-- 右侧装饰元素 -->
  <g transform="translate(700, 150)">
    <!-- 代码块装饰 -->
    <rect x="0" y="0" width="420" height="280" rx="15" fill="rgba(233,69,96,0.1)" stroke="url(#accentGradient)" stroke-width="2"/>
    <rect x="0" y="0" width="420" height="40" rx="15" fill="rgba(233,69,96,0.2)"/>
    
    <!-- 代码内容 -->
    <text x="20" y="30" font-family="monospace" font-size="16" fill="#e94560">bash</text>
    <text x="20" y="70" font-family="monospace" font-size="18" fill="#ffffff">openclaw backup create</text>
    <text x="20" y="100" font-family="monospace" font-size="18" fill="#a0a0a0"># 创建本地状态归档</text>
    <text x="20" y="150" font-family="monospace" font-size="18" fill="#ffffff">openclaw backup verify</text>
    <text x="20" y="180" font-family="monospace" font-size="18" fill="#a0a0a0"># 验证备份完整性</text>
    <text x="20" y="230" font-family="monospace" font-size="18" fill="#ffffff">openclaw --version</text>
    <text x="20" y="260" font-family="monospace" font-size="18" fill="#a0a0a0"># 查看带 git hash 的版本</text>
  </g>
  
  <!-- 底部装饰线 -->
  <line x1="80" y1="580" x2="1120" y2="580" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 底部文字 -->
  <text x="80" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#666666">
    编辑：乔叔 · LingQ Blog
  </text>
  
  <text x="1120" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#666666" text-anchor="end">
    2026-03-11
  </text>
</svg>
