<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="180" fill="#ffffff" opacity="0.12"/>
  <circle cx="1100" cy="530" r="220" fill="#ffffff" opacity="0.12"/>
  
  <!-- Code brackets -->
  <text x="100" y="200" font-size="180" fill="rgba(255,255,255,0.08)" font-family="monospace">&lt;</text>
  <text x="1050" y="450" font-size="180" fill="rgba(255,255,255,0.08)" font-family="monospace">/&gt;</text>
  
  <!-- Main icon group -->
  <g transform="translate(600, 150)" filter="url(#glow)">
    <rect x="-75" y="-75" width="150" height="150" rx="30" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" font-size="85">📦</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="url(#title)" filter="url(#shadow)">OpenClaw 完整安装指南</text>
  
  <!-- Subtitle -->
  <text x="600" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#ffffff" letter-spacing="3" font-weight="400">COMPLETE INSTALLATION GUIDE 2026</text>
  
  <!-- Divider -->
  <line x1="280" y1="355" x2="920" y2="355" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Platform cards -->
  <g transform="translate(180, 390)">
    <rect x="0" y="0" width="160" height="70" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-size="24">🪟</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">Windows 11</text>
  </g>
  
  <g transform="translate(360, 390)">
    <rect x="0" y="0" width="160" height="70" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-size="24">☁️</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">腾讯云 VPS</text>
  </g>
  
  <g transform="translate(540, 390)">
    <rect x="0" y="0" width="160" height="70" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-size="24">🇨🇳</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">国产模型</text>
  </g>
  
  <g transform="translate(720, 390)">
    <rect x="0" y="0" width="160" height="70" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-size="24">📱</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">飞书集成</text>
  </g>
  
  <g transform="translate(900, 390)">
    <rect x="0" y="0" width="160" height="70" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-size="24">🛠️</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">Skills</text>
  </g>
  
  <!-- Step indicators -->
  <g transform="translate(600, 520)">
    <circle cx="-120" cy="0" r="18" fill="rgba(255,255,255,0.25)"/>
    <text x="-120" y="6" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="700">1</text>
    
    <circle cx="-60" cy="0" r="18" fill="rgba(255,255,255,0.25)"/>
    <text x="-60" y="6" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="700">2</text>
    
    <circle cx="0" cy="0" r="18" fill="rgba(255,255,255,0.25)"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="700">3</text>
    
    <circle cx="60" cy="0" r="18" fill="rgba(255,255,255,0.25)"/>
    <text x="60" y="6" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="700">4</text>
    
    <circle cx="120" cy="0" r="18" fill="rgba(255,255,255,0.25)"/>
    <text x="120" y="6" text-anchor="middle" font-family="system-ui" font-size="14" fill="#fff" font-weight="700">5</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.8)" letter-spacing="2">2026 · 从零基础到生产部署 · LingQ Blog</text>
  
  <!-- Corner decorations -->
  <circle cx="50" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="80" cy="50" r="8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="110" cy="50" r="8" fill="rgba(255,255,255,0.2)"/>
  
  <circle cx="1150" cy="580" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1120" cy="580" r="8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1090" cy="580" r="8" fill="rgba(255,255,255,0.2)"/>
</svg>
