<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg1)"/>
  
  <!-- 标题 -->
  <text x="400" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">MiniMax 融资历程</text>
  
  <!-- 时间线 -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#ffd700" stroke-width="3"/>
  
  <!-- 2021 成立 -->
  <circle cx="150" cy="150" r="15" fill="#ffd700"/>
  <text x="150" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">2021</text>
  <text x="150" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">公司成立</text>
  <text x="150" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">闫俊杰创立</text>
  
  <!-- 2022 天使轮 -->
  <circle cx="300" cy="150" r="15" fill="#ffd700"/>
  <text x="300" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">2022</text>
  <text x="300" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">天使轮</text>
  <text x="300" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">12 亿人民币</text>
  
  <!-- 2024 估值 -->
  <circle cx="450" cy="150" r="15" fill="#ffd700"/>
  <text x="450" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">2024</text>
  <text x="450" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">估值 25 亿$</text>
  <text x="450" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">阿里领投</text>
  
  <!-- 2026 上市 -->
  <circle cx="600" cy="150" r="15" fill="#ffd700"/>
  <text x="600" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">2026</text>
  <text x="600" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">港股 IPO</text>
  <text x="600" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#888888" text-anchor="middle">市值 3000 亿+</text>
  
  <!-- 关键数据框 -->
  <rect x="100" y="320" width="280" height="120" fill="rgba(255,215,0,0.1)" rx="10" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <text x="240" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#ffd700" text-anchor="middle">💰 闫俊杰身价</text>
  <text x="240" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">78 亿美元</text>
  
  <rect x="420" y="320" width="280" height="120" fill="rgba(255,215,0,0.1)" rx="10" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <text x="560" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#ffd700" text-anchor="middle">📈 2025 年营收</text>
  <text x="560" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">7904 万美元</text>
  <text x="560" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">同比增长 158.9%</text>
  
  <!-- 底部说明 -->
  <text x="400" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#888888" text-anchor="middle">数据来源：公开财报、Forbes、36 氪</text>
  <text x="400" y="550" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#888888" text-anchor="middle">成立仅 4 年，从天使轮 12 亿到市值 3000 亿+</text>
</svg>
