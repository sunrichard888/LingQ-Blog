<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#e94560" opacity="0.1"/>
  <circle cx="900" cy="150" r="60" fill="#4ecca3" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    📰 科技日报
  </text>
  
  <!-- Date -->
  <text x="60" y="280" font-family="Arial, sans-serif" font-size="36" fill="#e94560" font-weight="bold">
    2026 年 3 月 7 日
  </text>
  
  <!-- Divider line -->
  <line x1="60" y1="320" x2="1140" y2="320" stroke="url(#accent)" stroke-width="4"/>
  
  <!-- Subtitle -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="28" fill="#cccccc">
    懂技术不装逼 · 会吐槽有观点
  </text>
  
  <!-- Hot topics preview -->
  <text x="60" y="450" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    🔥 林俊旸告别阿里
  </text>
  <text x="60" y="490" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    🤖 黄仁勋：软件将智能体化
  </text>
  <text x="60" y="530" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.9">
    🍎 库克的最后防御
  </text>
  
  <!-- Footer -->
  <text x="1140" y="600" font-family="Arial, sans-serif" font-size="20" fill="#e94560" text-anchor="end" font-weight="bold">
    编辑：乔叔
  </text>
  
  <!-- Rocket emoji -->
  <text x="1050" y="600" font-size="32">🚀</text>
</svg>
