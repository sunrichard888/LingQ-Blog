<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="url(#accent)" opacity="0.1"/>
  
  <!-- Title -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    🔬 科技日报
  </text>
  
  <!-- Date -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#00d9ff" text-anchor="middle">
    2026 年 3 月 21 日
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#888888" text-anchor="middle">
    TOP 20 热点 · AI 芯片 · 互联网 · 数码
  </text>
  
  <!-- Bottom accent line -->
  <rect x="300" y="480" width="600" height="4" fill="url(#accent)" rx="2"/>
</svg>
